<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nurse Verification - Vaidyo Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
* { font-family: 'Poppins', sans-serif; }
body { background: #0F0E1A; color: #E2E8F0; margin: 0; }

.sidebar { width:260px;min-height:100vh;background:linear-gradient(180deg,#1A1145 0%,#0D0B1E 100%);border-right:1px solid rgba(139,92,246,0.15);position:fixed;top:0;left:0;z-index:100;display:flex;flex-direction:column; }
.sidebar-brand { padding:24px 22px 20px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:12px; }
.sidebar-logo { width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#7C3AED,#4338CA);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(124,58,237,0.4); }
.sidebar-logo svg { width:20px;height:20px; }
.brand-text { font-weight:800;font-size:1.1rem;color:#fff; }
.brand-sub  { font-size:0.68rem;color:#7C3AED;font-weight:600;text-transform:uppercase;letter-spacing:.05em; }
.sidebar-section { padding:18px 14px 4px;font-size:0.68rem;font-weight:700;color:#4B5563;text-transform:uppercase;letter-spacing:.07em; }
.sidebar nav { flex:1;padding:8px 10px; }
.nav-item-admin { display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;color:rgba(255,255,255,0.65);font-weight:500;font-size:0.88rem;text-decoration:none;transition:all 0.25s;margin-bottom:4px; }
.nav-item-admin:hover { background:rgba(124,58,237,0.15);color:#C4B5FD; }
.nav-item-admin.active { background:linear-gradient(90deg,rgba(124,58,237,0.3),rgba(67,56,202,0.2));color:#fff;border-left:3px solid #7C3AED;padding-left:11px; }
.nav-item-admin .ni-icon { width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.nav-item-admin.active .ni-icon { background:rgba(124,58,237,0.3); }
.sidebar-footer { padding:16px 14px;border-top:1px solid rgba(255,255,255,0.06); }
.admin-user-row { display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 12px; }
.admin-avatar { width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#4338CA);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:#fff;flex-shrink:0; }
.admin-name { font-size:0.82rem;font-weight:600;color:#E2E8F0; }
.admin-role { font-size:0.7rem;color:#7C3AED; }
.logout-btn { margin-left:auto;background:none;border:none;color:#64748B;cursor:pointer;padding:4px; }
.logout-btn:hover { color:#DC2626; }

.main-content { margin-left:260px;padding:32px;min-height:100vh; }
.topbar { display:flex;align-items:center;justify-content:space-between;margin-bottom:28px; }
.topbar h1 { font-size:1.6rem;font-weight:800;color:#fff;margin:0; }
.topbar .sub { color:#64748B;font-size:0.85rem;margin-top:2px; }

.filter-bar { background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:18px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:24px; }
.filter-btn { padding:8px 18px;border-radius:50px;font-size:0.82rem;font-weight:600;border:1.5px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;transition:all 0.2s;font-family:'Poppins',sans-serif; }
.filter-btn:hover { border-color:#0891B2;color:#67E8F9; }
.filter-btn.active { background:linear-gradient(90deg,#0891B2,#0E7490);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(8,145,178,0.35); }
.filter-search { margin-left:auto;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 14px;color:#fff;font-size:0.85rem;font-family:'Poppins',sans-serif;outline:none;width:220px; }
.filter-search::placeholder { color:#475569; }
.filter-search:focus { border-color:#0891B2;background:rgba(8,145,178,0.1); }

/* Nurse cards — cyan accent instead of purple */
.nurse-card { background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:22px;transition:all 0.3s;position:relative;overflow:hidden; }
.nurse-card:hover { background:rgba(255,255,255,0.07);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.3); }
.nurse-card::before { content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0; }
.nurse-card.status-PENDING::before  { background:linear-gradient(90deg,#D97706,#FCD34D); }
.nurse-card.status-APPROVED::before { background:linear-gradient(90deg,#059669,#34D399); }
.nurse-card.status-REJECTED::before { background:linear-gradient(90deg,#DC2626,#F87171); }

.nc-header { display:flex;align-items:center;gap:14px;margin-bottom:16px; }
.nc-avatar { width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem;color:#fff;flex-shrink:0; }
.nc-name   { font-weight:700;color:#fff;font-size:0.97rem;margin-bottom:3px; }
.nc-mobile { font-size:0.78rem;color:#64748B; }

.status-badge { display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:50px;font-size:0.73rem;font-weight:700; }
.sb-pending  { background:rgba(217,119,6,0.15);color:#FCD34D; }
.sb-approved { background:rgba(5,150,105,0.15);color:#34D399; }
.sb-rejected { background:rgba(220,38,38,0.15);color:#FCA5A5; }

.nc-info-row { display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px; }
.nc-chip { background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 11px;font-size:0.75rem;color:#CBD5E1;display:flex;align-items:center;gap:6px; }
.nc-chip svg { color:#0891B2; }

.nc-actions { display:flex;gap:8px;flex-wrap:wrap; }
.act-btn { border-radius:9px;padding:7px 16px;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Poppins',sans-serif;border:1px solid; }
.act-btn.approve { color:#34D399;border-color:rgba(52,211,153,0.3);background:rgba(52,211,153,0.08); }
.act-btn.approve:hover { background:rgba(52,211,153,0.18);transform:translateY(-1px); }
.act-btn.reject  { color:#FCA5A5;border-color:rgba(252,165,165,0.3);background:rgba(252,165,165,0.08); }
.act-btn.reject:hover  { background:rgba(252,165,165,0.18);transform:translateY(-1px); }
.act-btn.view    { color:#67E8F9;border-color:rgba(103,232,249,0.3);background:rgba(103,232,249,0.08); }
.act-btn.view:hover    { background:rgba(103,232,249,0.18);transform:translateY(-1px); }

.empty-state { text-align:center;padding:60px 20px;color:#475569; }
.empty-state svg { opacity:0.3;margin-bottom:16px; }
.empty-state h5 { color:#64748B;font-weight:600; }

/* Modal */
.modal-overlay { position:fixed;inset:0;background:rgba(10,8,30,0.8);backdrop-filter:blur(4px);z-index:9998;display:none;align-items:center;justify-content:center;padding:20px; }
.modal-overlay.show { display:flex; }
.modal-box { background:#0F1E33;border:1px solid rgba(8,145,178,0.25);border-radius:24px;padding:36px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 32px 80px rgba(0,0,0,0.6); }
.modal-close { position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.07);border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:#94A3B8;cursor:pointer;transition:all 0.2s; }
.modal-close:hover { background:rgba(220,38,38,0.2);color:#FCA5A5; }
.modal-title { font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:20px; }
.detail-row { display:flex;gap:12px;margin-bottom:14px;align-items:flex-start; }
.detail-label { font-size:0.78rem;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.04em;width:160px;flex-shrink:0;padding-top:2px; }
.detail-value { font-size:0.88rem;color:#E2E8F0;font-weight:500;flex:1; }
.cert-preview { width:100%;border-radius:12px;margin-top:8px;border:1px solid rgba(255,255,255,0.1); }
.modal-actions { display:flex;gap:10px;margin-top:22px;flex-wrap:wrap; }

/* loading / toast */
.v-overlay { position:fixed;inset:0;background:rgba(10,8,30,0.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:9999; }
.v-overlay.show { display:flex; }
.v-box { background:#0F1E33;border:1px solid rgba(8,145,178,0.3);border-radius:20px;padding:30px 44px;display:flex;flex-direction:column;align-items:center;gap:12px; }
.spin { width:40px;height:40px;border:3px solid rgba(8,145,178,0.2);border-top-color:#0891B2;border-radius:50%;animation:spin 0.9s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.spin-text { color:#67E8F9;font-weight:600;font-size:0.88rem; }
.v-toast { position:fixed;top:24px;right:24px;min-width:300px;background:#0F1E33;border:1px solid rgba(8,145,178,0.25);border-left:5px solid #0891B2;border-radius:14px;box-shadow:0 16px 40px rgba(0,0,0,0.4);padding:14px 18px;display:flex;align-items:flex-start;gap:12px;transform:translateX(420px);opacity:0;transition:all 0.4s cubic-bezier(.4,0,.2,1);z-index:10000; }
.v-toast.show { transform:translateX(0);opacity:1; }
.v-toast.err  { border-left-color:#DC2626; }
.v-toast .ti  { width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;background:#0891B2; }
.v-toast.err .ti { background:#DC2626; }
.v-toast .tt  { font-weight:700;font-size:0.85rem;color:#E2E8F0;margin-bottom:2px; }
.v-toast .tm  { font-size:0.78rem;color:#94A3B8; }

@media(max-width:900px){ .sidebar{display:none;} .main-content{margin-left:0;padding:20px;} }
</style>
</head>
<body>

<div class="v-overlay" id="vOverlay"><div class="v-box"><div class="spin"></div><div class="spin-text">Processing...</div></div></div>
<div id="vToast" class="v-toast"><div class="ti" id="vTI"></div><div><div class="tt" id="vTT"></div><div class="tm" id="vTM"></div></div></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-title">Nurse Profile Details</div>
    <div id="modalContent"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg></div>
    <div><div class="brand-text">Vaidyo</div><div class="brand-sub">Admin Portal</div></div>
  </div>
  <div class="sidebar-section">Main</div>
  <nav>
    <a href="dashboard.html" class="nav-item-admin">
      <div class="ni-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
      Dashboard
    </a>
    <div class="sidebar-section">Verification</div>
    <a href="doctor-verification.html" class="nav-item-admin">
      <div class="ni-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v6a4 4 0 0 0 8 0V3"/><circle cx="18" cy="14" r="3"/><path d="M10 9v3a6 6 0 0 0 6 6"/></svg></div>
      Doctor Verification
    </a>
    <a href="nurse-verification.html" class="nav-item-admin active">
      <div class="ni-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="12" y1="13" x2="12" y2="17"/><line x1="10" y1="15" x2="14" y2="15"/></svg></div>
      Nurse Verification
    </a>
    <div class="sidebar-section">Users</div>
    <a href="users.html" class="nav-item-admin">
      <div class="ni-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-5-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      All Users
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-user-row">
      <div class="admin-avatar" id="adminAvatarLetter">A</div>
      <div><div class="admin-name" id="adminNameLabel">Admin</div><div class="admin-role">Super Admin</div></div>
      <button class="logout-btn" onclick="adminLogout()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main-content">
  <div class="topbar">
    <div>
      <h1>Nurse Verification</h1>
      <div class="sub" id="countLabel">Loading nurses...</div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('ALL',this)">All</button>
    <button class="filter-btn" onclick="setFilter('PENDING',this)">⏳ Pending</button>
    <button class="filter-btn" onclick="setFilter('APPROVED',this)">✅ Approved</button>
    <button class="filter-btn" onclick="setFilter('REJECTED',this)">❌ Rejected</button>
    <input type="text" class="filter-search" id="searchInput" placeholder="Search by name..." oninput="renderCards()">
  </div>

  <div class="row g-4" id="cardsContainer">
    <div class="col-12"><div class="empty-state"><div class="spin" style="margin:0 auto 16px;border-top-color:#0891B2;"></div><h5>Loading nurses...</h5></div></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
const adminToken = localStorage.getItem('adminToken');
if (!adminToken) window.location.href = 'login.html';

const adminUser = JSON.parse(localStorage.getItem('adminUser') || '{}');
document.getElementById('adminNameLabel').textContent = adminUser.username || 'Admin';
document.getElementById('adminAvatarLetter').textContent = (adminUser.username || 'A')[0].toUpperCase();

const avatarColors = ['#0891B2','#7C3AED','#059669','#D97706','#DC2626','#2563EB','#F97316'];
let allNurses = [];
let currentFilter = 'ALL';

let toastTimer;
function showToast(type, title, msg) {
    const t = document.getElementById('vToast'), ic = document.getElementById('vTI');
    document.getElementById('vTT').textContent = title;
    document.getElementById('vTM').textContent = msg;
    t.classList.remove('err');
    if(type==='error'){ t.classList.add('err'); ic.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'; }
    else { ic.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'; }
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
}

function renderCards() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allNurses.filter(n => {
        const matchFilter = currentFilter === 'ALL' || n.verificationStatus === currentFilter;
        const matchSearch = !search || (n.fullName||'').toLowerCase().includes(search);
        return matchFilter && matchSearch;
    });

    document.getElementById('countLabel').textContent = `${filtered.length} nurse${filtered.length!==1?'s':''} found`;

    if (!filtered.length) {
        document.getElementById('cardsContainer').innerHTML = `
            <div class="col-12"><div class="empty-state">
              <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="12" y1="13" x2="12" y2="17"/><line x1="10" y1="15" x2="14" y2="15"/></svg>
              <h5>No nurses found</h5><p style="font-size:0.85rem;">Try changing the filter or search term</p>
            </div></div>`;
        return;
    }

    document.getElementById('cardsContainer').innerHTML = filtered.map((n, i) => {
        const status = n.verificationStatus || 'PENDING';
        const badgeClass = status==='APPROVED'?'sb-approved':status==='REJECTED'?'sb-rejected':'sb-pending';
        const badgeIcon  = status==='APPROVED'?'✅':status==='REJECTED'?'❌':'⏳';
        const color = avatarColors[i % avatarColors.length];
        const actionBtns = status==='PENDING'
            ? `<button class="act-btn approve" onclick="approveNurse(${n.nurseProfileId||n.id})">✓ Approve</button><button class="act-btn reject" onclick="rejectNurse(${n.nurseProfileId||n.id})">✗ Reject</button>`
            : status==='APPROVED'
            ? `<button class="act-btn reject" onclick="rejectNurse(${n.nurseProfileId||n.id})">Revoke Approval</button>`
            : `<button class="act-btn approve" onclick="approveNurse(${n.nurseProfileId||n.id})">Re-Approve</button>`;
        return `
        <div class="col-md-6 col-lg-4">
          <div class="nurse-card status-${status}">
            <div class="nc-header">
              <div class="nc-avatar" style="background:${color}">${(n.fullName||'N')[0].toUpperCase()}</div>
              <div style="flex:1">
                <div class="nc-name">${n.fullName||'—'}</div>
                <div class="nc-mobile">${n.mobileNumber||''}</div>
              </div>
              <span class="status-badge ${badgeClass}">${badgeIcon} ${status}</span>
            </div>
            <div class="nc-info-row">
              <div class="nc-chip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>${n.nursingCouncilNumber||'No council no.'}</div>
              <div class="nc-chip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>${n.nursingCouncilState||'State not set'}</div>
            </div>
            ${n.rejectionReason ? `<div style="background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.25);border-radius:10px;padding:10px 12px;font-size:0.78rem;color:#FCA5A5;margin-bottom:14px;"><strong>Rejection reason:</strong> ${n.rejectionReason}</div>` : ''}
            <div class="nc-actions">
              <button class="act-btn view" onclick="viewNurse(${n.nurseProfileId||n.id})">👁 View Details</button>
              ${actionBtns}
            </div>
          </div>
        </div>`;
    }).join('');
}

async function loadNurses() {
    try {
        const data = await apiGet('/api/admin/nurses', adminToken);
        allNurses = Array.isArray(data) ? data : [];
        renderCards();
    } catch(e) {
        document.getElementById('cardsContainer').innerHTML = `<div class="col-12"><div class="empty-state"><h5 style="color:#DC2626;">Failed to load nurses</h5><p>Check your connection or admin token.</p></div></div>`;
    }
}

function viewNurse(id) {
    const n = allNurses.find(x => (x.nurseProfileId||x.id) === id);
    if (!n) return;
    const status = n.verificationStatus || 'PENDING';
    const badgeClass = status==='APPROVED'?'sb-approved':status==='REJECTED'?'sb-rejected':'sb-pending';
    document.getElementById('modalContent').innerHTML = `
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.08);">
          <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#0891B2,#0E7490);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#fff;">${(n.fullName||'N')[0].toUpperCase()}</div>
          <div><div style="font-weight:800;font-size:1.1rem;color:#fff;">${n.fullName||'—'}</div><span class="status-badge ${badgeClass}">${status}</span></div>
        </div>
        <div class="detail-row"><div class="detail-label">Mobile</div><div class="detail-value">${n.mobileNumber||'—'}</div></div>
        <div class="detail-row"><div class="detail-label">Council No.</div><div class="detail-value">${n.nursingCouncilNumber||'Not provided'}</div></div>
        <div class="detail-row"><div class="detail-label">Council State</div><div class="detail-value">${n.nursingCouncilState||'—'}</div></div>
        ${n.rejectionReason?`<div class="detail-row"><div class="detail-label">Rejection</div><div class="detail-value" style="color:#FCA5A5;">${n.rejectionReason}</div></div>`:''}
        ${n.certificateUrl
            ? `<div class="detail-row"><div class="detail-label">Certificate</div><div class="detail-value"><a href="${n.certificateUrl}" target="_blank" style="color:#67E8F9;">View Document ↗</a><br><img src="${n.certificateUrl}" class="cert-preview" onerror="this.style.display='none'" alt="Certificate"></div></div>`
            : `<div class="detail-row"><div class="detail-label">Certificate</div><div class="detail-value" style="color:#64748B;">Not uploaded</div></div>`}`;

    const actionBtns = status==='PENDING'
        ? `<button class="act-btn approve" onclick="approveNurse(${n.nurseProfileId||n.id});closeModal()">✓ Approve</button><button class="act-btn reject" onclick="rejectNurse(${n.nurseProfileId||n.id});closeModal()">✗ Reject</button>`
        : status==='APPROVED'
        ? `<button class="act-btn reject" onclick="rejectNurse(${n.nurseProfileId||n.id});closeModal()">Revoke Approval</button>`
        : `<button class="act-btn approve" onclick="approveNurse(${n.nurseProfileId||n.id});closeModal()">Re-Approve</button>`;
    document.getElementById('modalActions').innerHTML = actionBtns + `<button class="act-btn view" onclick="closeModal()" style="margin-left:auto;">Close</button>`;
    document.getElementById('detailModal').classList.add('show');
}

function closeModal() { document.getElementById('detailModal').classList.remove('show'); }
document.getElementById('detailModal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

async function approveNurse(id) {
    if(!confirm('Approve this nurse?')) return;
    document.getElementById('vOverlay').classList.add('show');
    try {
        await apiPut(`/api/admin/nurses/${id}/approve`, {}, adminToken);
        const n = allNurses.find(x=>(x.nurseProfileId||x.id)===id);
        if(n) n.verificationStatus='APPROVED';
        renderCards();
        showToast('success','Nurse Approved','Verification status updated successfully.');
    } catch(e) { showToast('error','Failed','Could not approve nurse. Try again.'); }
    finally { document.getElementById('vOverlay').classList.remove('show'); }
}

async function rejectNurse(id) {
    const reason = prompt('Enter rejection reason (optional):') || '';
    document.getElementById('vOverlay').classList.add('show');
    try {
        await apiPut(`/api/admin/nurses/${id}/reject`, { reason }, adminToken);
        const n = allNurses.find(x=>(x.nurseProfileId||x.id)===id);
        if(n){ n.verificationStatus='REJECTED'; n.rejectionReason=reason; }
        renderCards();
        showToast('success','Nurse Rejected','Verification status updated.');
    } catch(e) { showToast('error','Failed','Could not reject nurse. Try again.'); }
    finally { document.getElementById('vOverlay').classList.remove('show'); }
}

function adminLogout() {
    if(!confirm('Log out?')) return;
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminUser');
    window.location.href = 'login.html';
}

loadNurses();
</script>
