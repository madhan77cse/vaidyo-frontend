<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Verification - Vaidyo Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
* { font-family: 'Poppins', sans-serif; }
body { background: #0F0E1A; color: #E2E8F0; margin: 0; }

/* ── Sidebar (same as dashboard) ── */
.sidebar { width:260px;min-height:100vh;background:linear-gradient(180deg,#1A1145 0%,#0D0B1E 100%);border-right:1px solid rgba(139,92,246,0.15);position:fixed;top:0;left:0;z-index:100;display:flex;flex-direction:column; }
.sidebar-brand { padding:24px 22px 20px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:12px; }
.sidebar-logo { width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#7C3AED,#4338CA);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(124,58,237,0.4); }
.sidebar-logo svg { width:20px;height:20px; }
.brand-text { font-weight:800;font-size:1.1rem;color:#fff; }
.brand-sub  { font-size:0.68rem;color:#7C3AED;font-weight:600;text-transform:uppercase;letter-spacing:.05em; }
.sidebar-section { padding:18px 14px 4px;font-size:0.68rem;font-weight:700;color:#4B5563;text-transform:uppercase;letter-spacing:.07em; }
.sidebar nav { flex:1;padding:8px 10px; }
.nav-item-admin { display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;color:rgba(255,255,255,0.65);font-weight:500;font-size:0.88rem;text-decoration:none;transition:all 0.25s;margin-bottom:4px; }
.nav-item-admin:hover { background:rgba(124,58,237,0.15);color:#C4B5FD; }
.nav-item-admin.active { background:linear-gradient(90deg,rgba(124,58,237,0.3),rgba(67,56,202,0.2));color:#fff;border-left:3px solid #7C3AED;padding-left:11px; }
.nav-item-admin .ni-icon { width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.nav-item-admin.active .ni-icon { background:rgba(124,58,237,0.3); }
.badge-count { margin-left:auto;background:#DC2626;color:#fff;border-radius:50px;font-size:0.68rem;font-weight:700;padding:2px 7px; }
.sidebar-footer { padding:16px 14px;border-top:1px solid rgba(255,255,255,0.06); }
.admin-user-row { display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 12px; }
.admin-avatar { width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#4338CA);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:#fff;flex-shrink:0; }
.admin-name { font-size:0.82rem;font-weight:600;color:#E2E8F0; }
.admin-role { font-size:0.7rem;color:#7C3AED; }
.logout-btn { margin-left:auto;background:none;border:none;color:#64748B;cursor:pointer;padding:4px; }
.logout-btn:hover { color:#DC2626; }

/* ── Main ── */
.main-content { margin-left:260px;padding:32px;min-height:100vh; }
.topbar { display:flex;align-items:center;justify-content:space-between;margin-bottom:28px; }
.topbar h1 { font-size:1.6rem;font-weight:800;color:#fff;margin:0; }
.topbar .sub { color:#64748B;font-size:0.85rem;margin-top:2px; }

/* ── Filter bar ── */
.filter-bar {
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;padding:18px 22px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    margin-bottom:24px;
}
.filter-btn {
    padding:8px 18px;border-radius:50px;font-size:0.82rem;font-weight:600;
    border:1.5px solid rgba(255,255,255,0.12);
    background:transparent;color:rgba(255,255,255,0.6);
    cursor:pointer;transition:all 0.2s;font-family:'Poppins',sans-serif;
}
.filter-btn:hover { border-color:#7C3AED;color:#C4B5FD; }
.filter-btn.active { background:linear-gradient(90deg,#7C3AED,#4338CA);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(124,58,237,0.35); }
.filter-search {
    margin-left:auto;background:rgba(255,255,255,0.07);
    border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;
    padding:8px 14px;color:#fff;font-size:0.85rem;
    font-family:'Poppins',sans-serif;outline:none;width:220px;
}
.filter-search::placeholder { color:#475569; }
.filter-search:focus { border-color:#7C3AED;background:rgba(124,58,237,0.1); }

/* ── Cards grid ── */
.doctor-card {
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;padding:22px;
    transition:all 0.3s;position:relative;overflow:hidden;
}
.doctor-card:hover { background:rgba(255,255,255,0.07);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.3); }
.doctor-card::before { content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0; }
.doctor-card.status-PENDING::before  { background:linear-gradient(90deg,#D97706,#FCD34D); }
.doctor-card.status-APPROVED::before { background:linear-gradient(90deg,#059669,#34D399); }
.doctor-card.status-REJECTED::before { background:linear-gradient(90deg,#DC2626,#F87171); }

.dc-header { display:flex;align-items:center;gap:14px;margin-bottom:16px; }
.dc-avatar { width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem;color:#fff;flex-shrink:0; }
.dc-name { font-weight:700;color:#fff;font-size:0.97rem;margin-bottom:3px; }
.dc-mobile { font-size:0.78rem;color:#64748B; }

.status-badge { display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:50px;font-size:0.73rem;font-weight:700; }
.sb-pending  { background:rgba(217,119,6,0.15);color:#FCD34D; }
.sb-approved { background:rgba(5,150,105,0.15);color:#34D399; }
.sb-rejected { background:rgba(220,38,38,0.15);color:#FCA5A5; }

.dc-info-row { display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px; }
.dc-chip { background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 11px;font-size:0.75rem;color:#CBD5E1;display:flex;align-items:center;gap:6px; }
.dc-chip svg { color:#7C3AED; }

.dc-actions { display:flex;gap:8px;flex-wrap:wrap; }
.act-btn { border-radius:9px;padding:7px 16px;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Poppins',sans-serif;border:1px solid; }
.act-btn.approve { color:#34D399;border-color:rgba(52,211,153,0.3);background:rgba(52,211,153,0.08); }
.act-btn.approve:hover { background:rgba(52,211,153,0.18);transform:translateY(-1px); }
.act-btn.reject  { color:#FCA5A5;border-color:rgba(252,165,165,0.3);background:rgba(252,165,165,0.08); }
.act-btn.reject:hover  { background:rgba(252,165,165,0.18);transform:translateY(-1px); }
.act-btn.view    { color:#A78BFA;border-color:rgba(167,139,250,0.3);background:rgba(167,139,250,0.08); }
.act-btn.view:hover    { background:rgba(167,139,250,0.18);transform:translateY(-1px); }

.empty-state { text-align:center;padding:60px 20px;color:#475569; }
.empty-state svg { opacity:0.3;margin-bottom:16px; }
.empty-state h5 { color:#64748B;font-weight:600; }

/* ── Modal ── */
.modal-overlay { position:fixed;inset:0;background:rgba(10,8,30,0.8);backdrop-filter:blur(4px);z-index:9998;display:none;align-items:center;justify-content:center;padding:20px; }
.modal-overlay.show { display:flex; }
.modal-box { background:#1A1145;border:1px solid rgba(139,92,246,0.25);border-radius:24px;padding:36px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 32px 80px rgba(0,0,0,0.6); }
.modal-close { position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.07);border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:#94A3B8;cursor:pointer;transition:all 0.2s; }
.modal-close:hover { background:rgba(220,38,38,0.2);color:#FCA5A5; }
.modal-title { font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:20px; }
.detail-row { display:flex;gap:12px;margin-bottom:14px;align-items:flex-start; }
.detail-label { font-size:0.78rem;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.04em;width:140px;flex-shrink:0;padding-top:2px; }
.detail-value { font-size:0.88rem;color:#E2E8F0;font-weight:500;flex:1; }
.cert-preview { width:100%;border-radius:12px;margin-top:8px;border:1px solid rgba(255,255,255,0.1); }
.modal-actions { display:flex;gap:10px;margin-top:22px;flex-wrap:wrap; }

/* ── Loading / toast ── */
.v-overlay { position:fixed;inset:0;background:rgba(10,8,30,0.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:9999; }
.v-overlay.show { display:flex; }
.v-box { background:#1E1B4B;border:1px solid rgba(139,92,246,0.3);border-radius:20px;padding:30px 44px;display:flex;flex-direction:column;align-items:center;gap:12px; }
.spin { width:40px;height:40px;border:3px solid rgba(124,58,237,0.2);border-top-color:#7C3AED;border-radius:50%;animation:spin 0.9s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.spin-text { color:#C4B5FD;font-weight:600;font-size:0.88rem; }
.v-toast { position:fixed;top:24px;right:24px;min-width:300px;background:#1E1B4B;border:1px solid rgba(139,92,246,0.25);border-left:5px solid #7C3AED;border-radius:14px;box-shadow:0 16px 40px rgba(0,0,0,0.4);padding:14px 18px;display:flex;align-items:flex-start;gap:12px;transform:translateX(420px);opacity:0;transition:all 0.4s cubic-bezier(.4,0,.2,1);z-index:10000; }
.v-toast.show { transform:translateX(0);opacity:1; }
.v-toast.err  { border-left-color:#DC2626; }
.v-toast .ti  { width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;background:#7C3AED; }
.v-toast.err .ti { background:#DC2626; }
.v-toast .tt  { font-weight:700;font-size:0.85rem;color:#E2E8F0;margin-bottom:2px; }
.v-toast .tm  { font-size:0.78rem;color:#94A3B8; }

@media(max-width:900px){ .sidebar{display:none;} .main-content{margin-left:0;padding:20px;} }
</style>
</head>
<body>

<div class="v-overlay" id="vOverlay"><div class="v-box"><div class="spin"></div><div class="spin-text">Processing...</div></div></div>
<div id="vToast" class="v-toast"><div class="ti" id="vTI"></div><div><div class="tt" id="vTT"></div><div class="tm" id="vTM"></div></div></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-title">Doctor Profile Details</div>
    <div id="modalContent"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg></div>
    <div><div class="brand-text">Vaidyo</div><div class="brand-sub">Admin Portal</div></div>
  </div>
  <div class="sidebar-section">Main</div>
  <nav>
    <a href="dashboard.html" class="nav-item-admin">
      <div class="ni-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
      Dashboard
    </a>
    <div class="sidebar-section">Verification</div>
    <a href="doctor-verification.html" class="nav-item-admin active">
      <div class="ni-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v6a4 4 0 0 0 8 0V3"/><circle cx="18" cy="14" r="3"/><path d="M10 9v3a6 6 0 0 0 6 6"/></svg></div>
      Doctor Verification
    </a>
    <a href="nurse-verification.html" class="nav-item-admin">
      <div class="ni-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="12" y1="13" x2="12" y2="17"/><line x1="10" y1="15" x2="14" y2="15"/></svg></div>
      Nurse Verification
    </a>
    <div class="sidebar-section">Users</div>
    <a href="users.html" class="nav-item-admin">
      <div class="ni-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-5-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      All Users
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-user-row">
      <div class="admin-avatar" id="adminAvatarLetter">A</div>
      <div><div class="admin-name" id="adminNameLabel">Admin</div><div class="admin-role">Super Admin</div></div>
      <button class="logout-btn" onclick="adminLogout()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main-content">
  <div class="topbar">
    <div>
      <h1>Doctor Verification</h1>
      <div class="sub" id="countLabel">Loading doctors...</div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('ALL',this)">All</button>
    <button class="filter-btn" onclick="setFilter('PENDING',this)">⏳ Pending</button>
    <button class="filter-btn" onclick="setFilter('APPROVED',this)">✅ Approved</button>
    <button class="filter-btn" onclick="setFilter('REJECTED',this)">❌ Rejected</button>
    <input type="text" class="filter-search" id="searchInput" placeholder="Search by name..." oninput="renderCards()">
  </div>

  <!-- Cards -->
  <div class="row g-4" id="cardsContainer">
    <div class="col-12"><div class="empty-state"><div class="spin" style="margin:0 auto 16px;"></div><h5>Loading doctors...</h5></div></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
const adminToken = localStorage.getItem('adminToken');
if (!adminToken) window.location.href = 'login.html';

const adminUser = JSON.parse(localStorage.getItem('adminUser') || '{}');
document.getElementById('adminNameLabel').textContent = adminUser.username || 'Admin';
document.getElementById('adminAvatarLetter').textContent = (adminUser.username || 'A')[0].toUpperCase();

const avatarColors = ['#7C3AED','#2563EB','#059669','#D97706','#DC2626','#0891B2','#DB2777'];
let allDoctors = [];
let currentFilter = 'ALL';
let currentDoctor = null;

/* ── Toast ── */
let toastTimer;
function showToast(type, title, msg) {
    const t = document.getElementById('vToast'), ic = document.getElementById('vTI');
    document.getElementById('vTT').textContent = title;
    document.getElementById('vTM').textContent = msg;
    t.classList.remove('err');
    if(type==='error'){ t.classList.add('err'); ic.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'; }
    else { ic.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'; }
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

/* ── Filter ── */
function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
}

/* ── Render cards ── */
function renderCards() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allDoctors.filter(d => {
        const matchFilter = currentFilter === 'ALL' || d.verificationStatus === currentFilter;
        const matchSearch = !search || (d.fullName||'').toLowerCase().includes(search);
        return matchFilter && matchSearch;
    });

    document.getElementById('countLabel').textContent = `${filtered.length} doctor${filtered.length!==1?'s':''} found`;

    if (!filtered.length) {
        document.getElementById('cardsContainer').innerHTML = `
            <div class="col-12"><div class="empty-state">
              <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v6a4 4 0 0 0 8 0V3"/><circle cx="18" cy="14" r="3"/><path d="M10 9v3a6 6 0 0 0 6 6"/></svg>
              <h5>No doctors found</h5><p style="font-size:0.85rem;">Try changing the filter or search term</p>
            </div></div>`;
        return;
    }

    document.getElementById('cardsContainer').innerHTML = filtered.map((d, i) => {
        const status = d.verificationStatus || 'PENDING';
        const badgeClass = status === 'APPROVED' ? 'sb-approved' : status === 'REJECTED' ? 'sb-rejected' : 'sb-pending';
        const badgeIcon = status === 'APPROVED' ? '✅' : status === 'REJECTED' ? '❌' : '⏳';
        const color = avatarColors[i % avatarColors.length];
        const actionBtns = status === 'PENDING'
            ? `<button class="act-btn approve" onclick="approveDoctor(${d.doctorProfileId || d.id})">✓ Approve</button>
               <button class="act-btn reject"  onclick="rejectDoctor(${d.doctorProfileId || d.id})">✗ Reject</button>`
            : status === 'APPROVED'
            ? `<button class="act-btn reject" onclick="rejectDoctor(${d.doctorProfileId || d.id})">Revoke Approval</button>`
            : `<button class="act-btn approve" onclick="approveDoctor(${d.doctorProfileId || d.id})">Re-Approve</button>`;
        return `
        <div class="col-md-6 col-lg-4">
          <div class="doctor-card status-${status}">
            <div class="dc-header">
              <div class="dc-avatar" style="background:${color}">${(d.fullName||'D')[0].toUpperCase()}</div>
              <div style="flex:1">
                <div class="dc-name">${d.fullName||'—'}</div>
                <div class="dc-mobile">${d.mobileNumber||''}</div>
              </div>
              <span class="status-badge ${badgeClass}">${badgeIcon} ${status}</span>
            </div>
            <div class="dc-info-row">
              <div class="dc-chip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v6a4 4 0 0 0 8 0V3"/><circle cx="18" cy="14" r="3"/></svg>${d.speciality||'—'}</div>
              <div class="dc-chip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${d.experienceYears||0} yrs</div>
              <div class="dc-chip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>₹${d.consultationFee||'—'}</div>
            </div>
            <div class="dc-chip" style="margin-bottom:14px;width:fit-content;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>&nbsp;Lic: ${d.licenseNumber||'Not provided'}</div>
            ${d.rejectionReason ? `<div style="background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.25);border-radius:10px;padding:10px 12px;font-size:0.78rem;color:#FCA5A5;margin-bottom:14px;"><strong>Rejection reason:</strong> ${d.rejectionReason}</div>` : ''}
            <div class="dc-actions">
              <button class="act-btn view" onclick="viewDoctor(${d.doctorProfileId || d.id})">👁 View Details</button>
              ${actionBtns}
            </div>
          </div>
        </div>`;
    }).join('');
}

/* ── Load all doctors ── */
async function loadDoctors() {
    try {
        const data = await apiGet('/api/admin/doctors', adminToken);
        allDoctors = Array.isArray(data) ? data : [];
        renderCards();
    } catch(e) {
        document.getElementById('cardsContainer').innerHTML = `<div class="col-12"><div class="empty-state"><h5 style="color:#DC2626;">Failed to load doctors</h5><p>Check your connection or admin token.</p></div></div>`;
    }
}

/* ── View modal ── */
function viewDoctor(id) {
    currentDoctor = allDoctors.find(d => (d.doctorProfileId || d.id) === id);
    if (!currentDoctor) return;
    const d = currentDoctor;
    const status = d.verificationStatus || 'PENDING';
    const badgeClass = status === 'APPROVED' ? 'sb-approved' : status === 'REJECTED' ? 'sb-rejected' : 'sb-pending';

    document.getElementById('modalContent').innerHTML = `
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.08);">
          <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#7C3AED,#4338CA);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#fff;">${(d.fullName||'D')[0].toUpperCase()}</div>
          <div><div style="font-weight:800;font-size:1.1rem;color:#fff;">${d.fullName||'—'}</div><span class="status-badge ${badgeClass}">${status}</span></div>
        </div>
        <div class="detail-row"><div class="detail-label">Mobile</div><div class="detail-value">${d.mobileNumber||'—'}</div></div>
        <div class="detail-row"><div class="detail-label">Speciality</div><div class="detail-value">${d.speciality||'—'}</div></div>
        <div class="detail-row"><div class="detail-label">License No.</div><div class="detail-value">${d.licenseNumber||'Not provided'}</div></div>
        <div class="detail-row"><div class="detail-label">Experience</div><div class="detail-value">${d.experienceYears||0} years</div></div>
        <div class="detail-row"><div class="detail-label">Consult Fee</div><div class="detail-value">₹${d.consultationFee||'—'}</div></div>
        ${d.qualifications ? `<div class="detail-row"><div class="detail-label">Qualifications</div><div class="detail-value">${d.qualifications}</div></div>` : ''}
        ${d.bio ? `<div class="detail-row"><div class="detail-label">Bio</div><div class="detail-value">${d.bio}</div></div>` : ''}
        ${d.rejectionReason ? `<div class="detail-row"><div class="detail-label">Rejection</div><div class="detail-value" style="color:#FCA5A5;">${d.rejectionReason}</div></div>` : ''}
        ${d.certificateUrl ? `<div class="detail-row"><div class="detail-label">Certificate</div><div class="detail-value"><a href="${d.certificateUrl}" target="_blank" style="color:#A78BFA;">View Document ↗</a><br><img src="${d.certificateUrl}" class="cert-preview" onerror="this.style.display='none'" alt="Certificate"></div></div>` : '<div class="detail-row"><div class="detail-label">Certificate</div><div class="detail-value" style="color:#64748B;">Not uploaded</div></div>'}`;

    const actionBtns = status === 'PENDING'
        ? `<button class="act-btn approve" onclick="approveDoctor(${d.doctorProfileId||d.id});closeModal()">✓ Approve</button><button class="act-btn reject" onclick="rejectDoctor(${d.doctorProfileId||d.id});closeModal()">✗ Reject</button>`
        : status === 'APPROVED'
        ? `<button class="act-btn reject" onclick="rejectDoctor(${d.doctorProfileId||d.id});closeModal()">Revoke Approval</button>`
        : `<button class="act-btn approve" onclick="approveDoctor(${d.doctorProfileId||d.id});closeModal()">Re-Approve</button>`;
    document.getElementById('modalActions').innerHTML = actionBtns + `<button class="act-btn view" onclick="closeModal()" style="margin-left:auto;">Close</button>`;
    document.getElementById('detailModal').classList.add('show');
}

function closeModal() { document.getElementById('detailModal').classList.remove('show'); }
document.getElementById('detailModal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

/* ── Approve / Reject ── */
async function approveDoctor(id) {
    if (!confirm('Approve this doctor?')) return;
    document.getElementById('vOverlay').classList.add('show');
    try {
        const res = await fetch(`${BASE_URL}/api/admin/doctors/${id}/approve`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + adminToken
            }
        });

        if (!res.ok) {
            const err = await res.text();
            console.error('Approve failed:', res.status, err);
            showToast('error', 'Failed', `Server returned ${res.status}: ${err}`);
            return;
        }

        const doc = allDoctors.find(d => (d.doctorProfileId || d.id) === id);
        if (doc) doc.verificationStatus = 'APPROVED';
        renderCards();
        showToast('success', 'Doctor Approved', 'Verification status updated successfully.');
    } catch (e) {
        console.error('Approve error:', e);
        showToast('error', 'Failed', 'Could not approve doctor. Try again.');
    } finally {
        document.getElementById('vOverlay').classList.remove('show');
    }
}

async function rejectDoctor(id) {
    const reason = prompt('Enter rejection reason (optional):') || '';
    document.getElementById('vOverlay').classList.add('show');
    try {
        // reason as query param (Spring Boot @RequestParam style)
        const url = `${BASE_URL}/api/admin/doctors/${id}/reject${reason ? `?reason=${encodeURIComponent(reason)}` : ''}`;
        const res = await fetch(url, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + adminToken
            }
        });

        if (!res.ok) {
            const err = await res.text();
            console.error('Reject failed:', res.status, err);
            showToast('error', 'Failed', `Server returned ${res.status}: ${err}`);
            return;
        }

        const doc = allDoctors.find(d => (d.doctorProfileId || d.id) === id);
        if (doc) { doc.verificationStatus = 'REJECTED'; doc.rejectionReason = reason; }
        renderCards();
        showToast('success', 'Doctor Rejected', 'Verification status updated.');
    } catch (e) {
        console.error('Reject error:', e);
        showToast('error', 'Failed', 'Could not reject doctor. Try again.');
    } finally {
        document.getElementById('vOverlay').classList.remove('show');
    }
}
function adminLogout() {
    if(!confirm('Log out?')) return;
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminUser');
    window.location.href = 'login.html';
}

loadDoctors();
</script>
