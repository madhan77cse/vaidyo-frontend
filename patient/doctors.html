<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Doctors - Vaidyo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="../css/style.css">
<style>
/* ═══════════════════════════════════════════════
   PAGE BACKGROUND — deep crystal mesh
═══════════════════════════════════════════════ */
body {
  background: #0D1B35;
  min-height: 100vh;
}

/* animated crystal orbs in background */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 600px 400px at 10% 20%,  rgba(37,99,235,.15) 0%, transparent 70%),
    radial-gradient(ellipse 500px 350px at 85% 10%,  rgba(124,58,237,.12) 0%, transparent 65%),
    radial-gradient(ellipse 700px 500px at 50% 80%,  rgba(5,150,105,.10) 0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 90% 75%,  rgba(8,145,178,.12) 0%, transparent 65%),
    radial-gradient(ellipse 350px 250px at 5%  90%,  rgba(220,38,38,.07) 0%, transparent 60%);
}

/* everything sits above the bg */
nav, .find-header, .container, .modal { position: relative; z-index: 1; }

/* ═══════════════════════════════════════════════
   NAVBAR tweak — fully transparent on dark bg
═══════════════════════════════════════════════ */
.navbar-vaidyo { background: rgba(13,27,53,.70) !important; backdrop-filter: blur(12px); }

/* ═══════════════════════════════════════════════
   PAGE HEADER
═══════════════════════════════════════════════ */
.find-header {
  padding: 42px 0 32px;
  color: #fff;
}
.find-header h2 { font-weight: 800; font-size: 2.2rem; letter-spacing: -.02em; }
.find-header p  { color: rgba(255,255,255,.65); margin-bottom: 0; }

/* ═══════════════════════════════════════════════
   FILTER BAR — glass card
═══════════════════════════════════════════════ */
.filter-bar {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 20px;
  padding: 24px 28px 18px;
  margin-bottom: 32px;
}
.filter-bar .form-control,
.filter-bar .form-select {
  background: rgba(255,255,255,.08);
  border: 1.5px solid rgba(255,255,255,.15);
  color: #fff;
  border-radius: 10px;
  font-size: .88rem;
}
.filter-bar .form-control::placeholder { color: rgba(255,255,255,.4); }
.filter-bar .form-control:focus,
.filter-bar .form-select:focus {
  border-color: #60A5FA;
  box-shadow: 0 0 0 3px rgba(96,165,250,.2);
  background: rgba(255,255,255,.12);
}
.filter-bar .form-select option { background: #1E293B; color: #fff; }
.filter-bar label { color: rgba(255,255,255,.75); font-size: .82rem; }
.filter-bar .input-group-text {
  background: rgba(255,255,255,.08);
  border: 1.5px solid rgba(255,255,255,.15);
  border-right: none;
  color: rgba(255,255,255,.5);
  border-radius: 10px 0 0 10px;
}
.filter-bar .input-group .form-control {
  border-left: none;
  border-radius: 0 10px 10px 0;
}

/* ═══════════════════════════════════════════════
   VIEW TOGGLE
═══════════════════════════════════════════════ */
.view-toggle-btn {
  border-radius: 10px !important;
  font-weight: 600;
  font-size: .82rem;
  border-color: rgba(255,255,255,.3) !important;
  color: rgba(255,255,255,.8) !important;
  padding: 7px 18px;
}
.view-toggle-btn.active {
  background: linear-gradient(135deg,#2563EB,#7C3AED) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 4px 16px rgba(37,99,235,.45);
}

/* ═══════════════════════════════════════════════
   RESULTS BAR
═══════════════════════════════════════════════ */
.results-bar { font-size: .85rem; color: rgba(255,255,255,.5); margin-bottom: 18px; }
.results-bar span { font-weight: 700; color: #60A5FA; }

/* ═══════════════════════════════════════════════
   DOCTOR CARD — glassmorphic with coloured glow
═══════════════════════════════════════════════ */
.doctor-card {
  border-radius: 22px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.10);
  background: rgba(30,50,90,.65);
  backdrop-filter: blur(18px);
  display: flex;
  flex-direction: column;
  height: 100%;
  transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease;
  position: relative;
}
.doctor-card:hover {
  transform: translateY(-8px);
  border-color: rgba(255,255,255,.22);
}
/* per-colour hover glow */
.doctor-card.glow-blue:hover  { box-shadow: 0 20px 50px rgba(37,99,235,.35); }
.doctor-card.glow-purple:hover{ box-shadow: 0 20px 50px rgba(124,58,237,.35); }
.doctor-card.glow-cyan:hover  { box-shadow: 0 20px 50px rgba(8,145,178,.35); }
.doctor-card.glow-green:hover { box-shadow: 0 20px 50px rgba(5,150,105,.35); }
.doctor-card.glow-amber:hover { box-shadow: 0 20px 50px rgba(217,119,6,.35); }
.doctor-card.glow-red:hover   { box-shadow: 0 20px 50px rgba(220,38,38,.35); }

/* coloured banner */
.dc-banner {
  height: 80px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.dc-banner.b-blue   { background: linear-gradient(135deg,#1D4ED8,#3B82F6); }
.dc-banner.b-purple { background: linear-gradient(135deg,#5B21B6,#8B5CF6); }
.dc-banner.b-cyan   { background: linear-gradient(135deg,#0E7490,#22D3EE); }
.dc-banner.b-green  { background: linear-gradient(135deg,#065F46,#34D399); }
.dc-banner.b-amber  { background: linear-gradient(135deg,#92400E,#FCD34D); }
.dc-banner.b-red    { background: linear-gradient(135deg,#991B1B,#F87171); }

/* subtle noise texture overlay */
.dc-banner::after {
  content:'';
  position:absolute; inset:0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  opacity:.25;
}

/* floating avatar */
.dc-avatar-wrap {
  width: 80px; height: 80px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: absolute;
  bottom: -36px; left: 50%; transform: translateX(-50%);
  border: 3px solid rgba(255,255,255,.2);
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  font-size: 2.2rem;
  color: #fff;
  z-index: 2;
}
.dc-avatar-wrap.av-blue   { background: linear-gradient(135deg,#1D4ED8,#60A5FA); }
.dc-avatar-wrap.av-purple { background: linear-gradient(135deg,#5B21B6,#A78BFA); }
.dc-avatar-wrap.av-cyan   { background: linear-gradient(135deg,#0E7490,#67E8F9); }
.dc-avatar-wrap.av-green  { background: linear-gradient(135deg,#065F46,#6EE7B7); }
.dc-avatar-wrap.av-amber  { background: linear-gradient(135deg,#92400E,#FDE68A); }
.dc-avatar-wrap.av-red    { background: linear-gradient(135deg,#991B1B,#FCA5A5); }
.dc-avatar-wrap img { width:100%; height:100%; border-radius:50%; object-fit:cover; }

/* card body */
.dc-body {
  padding: 48px 22px 22px;
  display: flex; flex-direction: column; flex: 1;
  text-align: center;
}
.dc-name {
  font-size: 1.05rem; font-weight: 700;
  color: #F1F5F9; margin-bottom: 6px;
}

/* spec badge */
.spec-badge {
  display: inline-block;
  padding: 3px 14px;
  border-radius: 50px;
  font-size: .70rem; font-weight: 700;
  letter-spacing: .5px;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.sb-blue   { background: rgba(37,99,235,.25);  color: #93C5FD; border: 1px solid rgba(37,99,235,.4); }
.sb-purple { background: rgba(124,58,237,.25); color: #C4B5FD; border: 1px solid rgba(124,58,237,.4); }
.sb-cyan   { background: rgba(8,145,178,.25);  color: #67E8F9; border: 1px solid rgba(8,145,178,.4); }
.sb-green  { background: rgba(5,150,105,.25);  color: #6EE7B7; border: 1px solid rgba(5,150,105,.4); }
.sb-amber  { background: rgba(217,119,6,.25);  color: #FDE68A; border: 1px solid rgba(217,119,6,.4); }
.sb-red    { background: rgba(220,38,38,.25);  color: #FCA5A5; border: 1px solid rgba(220,38,38,.4); }

/* stars */
.dc-stars { font-size: .85rem; color: #F59E0B; margin-bottom: 10px; }
.dc-stars .rev-count { color: rgba(255,255,255,.35); font-size: .75rem; margin-left: 4px; }

/* meta info */
.dc-meta {
  font-size: .82rem; color: rgba(255,255,255,.55);
  margin-bottom: 4px; text-align: left;
  display: flex; align-items: center; gap: 8px;
}
.dc-meta i { width: 14px; text-align: center; color: #60A5FA; }

/* fee pill */
.dc-fee-badge {
  display: inline-block;
  background: rgba(99,102,241,.18);
  border: 1px solid rgba(99,102,241,.35);
  color: #A5B4FC;
  border-radius: 8px;
  padding: 5px 16px;
  font-size: .85rem; font-weight: 600;
  margin: 8px 0 16px;
}

/* action buttons */
.dc-actions { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }

.btn-book-doc {
  background: linear-gradient(135deg,#2563EB,#7C3AED);
  color: #fff; border: none;
  border-radius: 11px;
  font-weight: 600; padding: 11px;
  transition: all .25s ease; font-size: .88rem;
  cursor: pointer; width: 100%;
}
.btn-book-doc:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(124,58,237,.45);
}
.btn-view-profile {
  background: rgba(255,255,255,.06);
  color: #93C5FD;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 11px;
  font-weight: 600; padding: 10px;
  transition: all .25s ease; font-size: .88rem;
  text-decoration: none; display: block;
}
.btn-view-profile:hover {
  background: rgba(255,255,255,.12);
  color: #BFDBFE;
  border-color: rgba(255,255,255,.25);
}

/* ═══════════════════════════════════════════════
   MAP
═══════════════════════════════════════════════ */
.doctorsMap {
  height: 460px; border-radius: 20px; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.4);
  border: 1px solid rgba(255,255,255,.1);
  margin-bottom: 32px;
}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
.modal-content {
  background: #0F172A;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 22px !important;
  color: #fff;
}
.modal-header {
  background: linear-gradient(135deg,#1D4ED8,#7C3AED);
  border-radius: 21px 21px 0 0;
  border-bottom: none;
}
.modal-body .form-control {
  background: rgba(255,255,255,.07);
  border: 1.5px solid rgba(255,255,255,.15);
  color: #fff; border-radius: 10px;
}
.modal-body .form-control:focus {
  border-color: #60A5FA;
  box-shadow: 0 0 0 3px rgba(96,165,250,.2);
}
.modal-body .form-control::placeholder { color: rgba(255,255,255,.35); }
.modal-body label { color: rgba(255,255,255,.7); }
.modal-info-box {
  background: rgba(37,99,235,.15);
  border: 1px solid rgba(37,99,235,.3);
  border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
}
.modal-doc-icon {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg,#2563EB,#7C3AED);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 1.2rem; flex-shrink: 0;
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-vaidyo">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-heart-pulse"></i> Vaidyo</a>
    <div class="ms-auto d-flex gap-2">
      <a href="dashboard.html" class="btn btn-sm btn-outline-light">Dashboard</a>
      <a href="medicines.html" class="btn btn-sm btn-outline-light">Medicines</a>
      <a href="health.html" class="btn btn-sm btn-outline-light">Health</a>
      <a href="appointments.html" class="btn btn-sm btn-outline-light">Appointments</a>
      <button class="btn btn-sm btn-light" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<!-- Page header -->
<div class="find-header">
  <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
    <div>
      <h2><i class="fa-solid fa-stethoscope me-2" style="color:#60A5FA;"></i>Find a Doctor</h2>
      <p>Search, filter, and book a visit with a verified doctor near you.</p>
    </div>
    <div class="btn-group" role="group">
      <button type="button" id="gridViewBtn" class="btn view-toggle-btn active">
        <i class="fa-solid fa-table-cells-large me-1"></i> Grid
      </button>
      <button type="button" id="mapViewBtn" class="btn view-toggle-btn">
        <i class="fa-solid fa-map-location-dot me-1"></i> Map
      </button>
    </div>
  </div>
</div>

<div class="container py-4">

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="row g-2 mb-3">
      <div class="col-12">
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
          <input type="text" class="form-control" id="searchInput" placeholder="Search doctor by name…">
        </div>
      </div>
    </div>
    <div class="row g-2 align-items-end">
      <div class="col-6 col-md-3">
        <label class="form-label mb-1">Specialization</label>
        <select class="form-select" id="specialityFilter">
          <option value="">All Specialities</option>
          <option value="GENERAL">General</option>
          <option value="CARDIOLOGY">Cardiology</option>
          <option value="ORTHOPEDICS">Orthopedics</option>
          <option value="DIABETOLOGY">Diabetology</option>
          <option value="NEUROLOGY">Neurology</option>
          <option value="DERMATOLOGY">Dermatology</option>
          <option value="ENT">ENT</option>
          <option value="OPHTHALMOLOGY">Ophthalmology</option>
          <option value="GYNECOLOGY">Gynecology</option>
          <option value="PEDIATRICS">Pediatrics</option>
          <option value="PSYCHIATRY">Psychiatry</option>
          <option value="UROLOGY">Urology</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label mb-1">Experience (yrs)</label>
        <div class="d-flex gap-1">
          <input type="number" min="0" max="30" class="form-control" id="expMin" placeholder="Min">
          <input type="number" min="0" max="30" class="form-control" id="expMax" placeholder="Max">
        </div>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label mb-1">Fee (₹)</label>
        <div class="d-flex gap-1">
          <input type="number" min="0" class="form-control" id="feeMin" placeholder="Min">
          <input type="number" min="0" class="form-control" id="feeMax" placeholder="Max">
        </div>
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label mb-1">Rating</label>
        <select class="form-select" id="ratingFilter">
          <option value="0">Any Rating</option>
          <option value="3">3★ and up</option>
          <option value="4">4★ and up</option>
          <option value="5">5★ only</option>
        </select>
      </div>
      <div class="col-12 col-md-1">
        <button class="btn btn-primary w-100" id="applyFiltersBtn" style="border-radius:10px;padding:9px;" title="Apply">
          <i class="fa-solid fa-sliders"></i>
        </button>
      </div>
    </div>
    <div class="d-flex justify-content-end mt-2">
      <button class="btn btn-sm btn-outline-secondary" id="clearFiltersBtn" style="border-radius:8px;color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.2);">
        <i class="fa-solid fa-xmark me-1"></i>Clear Filters
      </button>
    </div>
  </div>

  <div class="results-bar" id="resultsBar"></div>

  <div class="row g-4" id="doctorGrid">
    <div class="col-12 text-center py-5" style="color:rgba(255,255,255,.4);">
      <div class="spinner-border text-primary mb-3" role="status"></div>
      <p>Loading doctors…</p>
    </div>
  </div>

  <div id="doctorsMap" class="doctorsMap d-none"></div>

</div>

<!-- Book Modal -->
<div class="modal fade" id="bookModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-white fw-bold">
          <i class="fa-solid fa-calendar-check me-2"></i>Book Home Visit
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <div class="modal-info-box">
          <div class="modal-doc-icon"><i class="fa-solid fa-user-doctor"></i></div>
          <div>
            <p id="bookDoctorName" class="fw-bold mb-0" style="color:#E2E8F0;"></p>
            <p style="color:rgba(255,255,255,.45);font-size:.8rem;margin:0;">Home Visit Appointment</p>
          </div>
        </div>
        <form id="bookForm">
          <input type="hidden" id="bookDoctorId">
          <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-location-dot me-1" style="color:#60A5FA;"></i>Your Address</label>
            <textarea class="form-control" id="patientAddress" rows="2" required placeholder="Enter your full address…"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-notes-medical me-1" style="color:#60A5FA;"></i>Symptoms</label>
            <textarea class="form-control" id="symptoms" rows="3" required placeholder="Describe your symptoms…"></textarea>
          </div>
          <button type="submit" class="btn-book-doc mt-1">
            <i class="fa-solid fa-paper-plane me-2"></i>Submit Request
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
if (!checkAuth('PATIENT')) { }
const auth = getAuth();

const SPEC_COLORS = {
  GENERAL:      { banner:'b-blue',   badge:'sb-blue',   glow:'glow-blue',   av:'av-blue'   },
  CARDIOLOGY:   { banner:'b-red',    badge:'sb-red',    glow:'glow-red',    av:'av-red'    },
  ORTHOPEDICS:  { banner:'b-cyan',   badge:'sb-cyan',   glow:'glow-cyan',   av:'av-cyan'   },
  DIABETOLOGY:  { banner:'b-amber',  badge:'sb-amber',  glow:'glow-amber',  av:'av-amber'  },
  NEUROLOGY:    { banner:'b-purple', badge:'sb-purple', glow:'glow-purple', av:'av-purple' },
  DERMATOLOGY:  { banner:'b-green',  badge:'sb-green',  glow:'glow-green',  av:'av-green'  },
  ENT:          { banner:'b-blue',   badge:'sb-blue',   glow:'glow-blue',   av:'av-blue'   },
  OPHTHALMOLOGY:{ banner:'b-cyan',   badge:'sb-cyan',   glow:'glow-cyan',   av:'av-cyan'   },
  GYNECOLOGY:   { banner:'b-red',    badge:'sb-red',    glow:'glow-red',    av:'av-red'    },
  PEDIATRICS:   { banner:'b-green',  badge:'sb-green',  glow:'glow-green',  av:'av-green'  },
  PSYCHIATRY:   { banner:'b-amber',  badge:'sb-amber',  glow:'glow-amber',  av:'av-amber'  },
  UROLOGY:      { banner:'b-purple', badge:'sb-purple', glow:'glow-purple', av:'av-purple' },
};
function col(spec){ return SPEC_COLORS[spec]||SPEC_COLORS.GENERAL; }

let allDoctors=[], currentFiltered=[], leafletMap=null, mapMarkers=[];

function esc(s){ if(!s)return''; return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function stars(r){
  r=r||0; let h='';
  for(let i=1;i<=5;i++) h+=`<i class="fa-${i<=Math.round(r)?'solid':'regular'} fa-star"></i>`;
  return h;
}

async function loadDoctors(){
  try{
    allDoctors = await apiGet('/api/patient/doctors');
    currentFiltered = allDoctors;
    renderDoctors(currentFiltered);
  }catch{
    document.getElementById('doctorGrid').innerHTML='<p class="text-danger text-center py-4">Failed to load doctors.</p>';
  }
}

function renderDoctors(doctors){
  const grid=document.getElementById('doctorGrid');
  const bar=document.getElementById('resultsBar');
  bar.innerHTML=`Showing <span>${doctors.length}</span> doctor${doctors.length!==1?'s':''}`;
  if(!doctors.length){
    grid.innerHTML=`<div class="col-12 text-center py-5" style="color:rgba(255,255,255,.35);">
      <i class="fa-solid fa-user-doctor fa-3x mb-3 opacity-25"></i><p>No doctors match your filters.</p></div>`;
    return;
  }
  grid.innerHTML=doctors.map(d=>{
    const c=col(d.speciality), name=esc(d.fullName), hasR=d.avgRating!=null;
    return `
    <div class="col-md-4 col-sm-6">
      <div class="doctor-card ${c.glow}">
        <div class="dc-banner ${c.banner}">
          <div class="dc-avatar-wrap ${c.av}">
            ${d.profilePhoto?`<img src="${esc(d.profilePhoto)}" alt="Dr. ${name}">`
              :`<i class="fa-solid fa-user-doctor"></i>`}
          </div>
        </div>
        <div class="dc-body">
          <p class="dc-name">Dr. ${name}</p>
          <div><span class="spec-badge ${c.badge}">${d.speciality}</span></div>
          ${hasR?`<div class="dc-stars">${stars(d.avgRating)}<span class="rev-count">(${d.reviewCount||0})</span></div>`:''}
          <div class="mb-1">
            <p class="dc-meta"><i class="fa-solid fa-briefcase-medical"></i>${d.experienceYears||0} yrs experience</p>
            ${d.location?`<p class="dc-meta"><i class="fa-solid fa-location-dot"></i>${esc(d.location)}</p>`:''}
          </div>
          <div class="text-center">
            <span class="dc-fee-badge"><i class="fa-solid fa-rupee-sign me-1"></i>₹${d.consultationFee||0} per visit</span>
          </div>
          <div class="dc-actions">
            <button class="btn-book-doc btn-book" data-id="${d.userId}" data-name="${name}">
              <i class="fa-solid fa-calendar-check me-2"></i>Book Appointment
            </button>
            <a class="btn-view-profile" href="doctor-profile.html?id=${d.userId}">
              <i class="fa-solid fa-eye me-2"></i>View Profile
            </a>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('doctorGrid').addEventListener('click',e=>{
  const btn=e.target.closest('.btn-book');
  if(btn) openBookModal(btn.dataset.id, btn.dataset.name);
});

document.getElementById('searchInput').addEventListener('input', filterDoctors);
document.getElementById('applyFiltersBtn').addEventListener('click', filterDoctors);
document.getElementById('clearFiltersBtn').addEventListener('click', clearFilters);

function filterDoctors(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const spec=document.getElementById('specialityFilter').value;
  const expMin=parseFloat(document.getElementById('expMin').value)||0;
  const expMax=parseFloat(document.getElementById('expMax').value)||Infinity;
  const feeMin=parseFloat(document.getElementById('feeMin').value)||0;
  const feeMax=parseFloat(document.getElementById('feeMax').value)||Infinity;
  const minStar=parseFloat(document.getElementById('ratingFilter').value)||0;
  currentFiltered=allDoctors.filter(d=>{
    const r=d.avgRating||0;
    return d.fullName.toLowerCase().includes(search)
      &&(!spec||d.speciality===spec)
      &&(d.experienceYears||0)>=expMin&&(d.experienceYears||0)<=expMax
      &&(d.consultationFee||0)>=feeMin&&(d.consultationFee||0)<=feeMax
      &&(minStar===0||(minStar===5?r>=5:r>=minStar));
  });
  renderDoctors(currentFiltered);
  if(leafletMap) updateMapMarkers(currentFiltered);
}

function clearFilters(){
  ['searchInput','expMin','expMax','feeMin','feeMax'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('specialityFilter').value='';
  document.getElementById('ratingFilter').value='0';
  currentFiltered=allDoctors;
  renderDoctors(currentFiltered);
  if(leafletMap) updateMapMarkers(currentFiltered);
}

function openBookModal(id, name){
  document.getElementById('bookForm').reset();
  document.getElementById('bookDoctorId').value=id;
  document.getElementById('bookDoctorName').textContent='Dr. '+name;
  new bootstrap.Modal(document.getElementById('bookModal')).show();
}

document.getElementById('bookForm').addEventListener('submit',async function(e){
  e.preventDefault();
  const payload={
    doctorId:parseInt(document.getElementById('bookDoctorId').value),
    patientAddress:document.getElementById('patientAddress').value,
    symptoms:document.getElementById('symptoms').value
  };
  showLoading();
  try{
    await apiPost('/api/patient/appointments?patientId='+auth.userId, payload);
    hideLoading(); showSuccess('Appointment request sent!');
    bootstrap.Modal.getInstance(document.getElementById('bookModal')).hide();
  }catch{ hideLoading(); showError('Failed to book appointment.'); }
});

document.getElementById('gridViewBtn').addEventListener('click',()=>setView('grid'));
document.getElementById('mapViewBtn').addEventListener('click',()=>setView('map'));

function setView(v){
  const isMap=v==='map';
  document.getElementById('doctorGrid').classList.toggle('d-none',isMap);
  document.getElementById('doctorsMap').classList.toggle('d-none',!isMap);
  document.getElementById('gridViewBtn').classList.toggle('active',!isMap);
  document.getElementById('mapViewBtn').classList.toggle('active',isMap);
  if(isMap){ initMap(); setTimeout(()=>leafletMap&&leafletMap.invalidateSize(),200); updateMapMarkers(currentFiltered); }
}

function initMap(){
  if(leafletMap) return;
  leafletMap=L.map('doctorsMap').setView([20.5937,78.9629],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(leafletMap);
}

function updateMapMarkers(doctors){
  if(!leafletMap) return;
  mapMarkers.forEach(m=>leafletMap.removeLayer(m));
  mapMarkers=[];
  doctors.forEach(d=>{
    if(d.latitude&&d.longitude){
      const m=L.marker([d.latitude,d.longitude]).addTo(leafletMap)
        .bindPopup(`<strong>Dr. ${esc(d.fullName)}</strong><br>${d.speciality}<br>₹${d.consultationFee||0}`);
      mapMarkers.push(m);
    }
  });
}

loadDoctors();
</script>
</body>
</html>
