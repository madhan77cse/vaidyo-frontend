<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Doctors - Vaidyo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="../css/style.css">
<style>
body {
  min-height: 100vh;
  background: #060D1F;
  background-image:
    radial-gradient(ellipse 520px 380px at -5% 0%,   rgba(6,182,212,.13)  0%, transparent 65%),
    radial-gradient(ellipse 480px 320px at 105% 5%,  rgba(239,68,68,.10)  0%, transparent 60%),
    radial-gradient(ellipse 400px 350px at 0%  55%,  rgba(16,185,129,.09) 0%, transparent 60%),
    radial-gradient(ellipse 450px 300px at 100% 50%, rgba(139,92,246,.09) 0%, transparent 55%),
    radial-gradient(ellipse 700px 350px at 50% 110%, rgba(59,130,246,.08) 0%, transparent 60%);
  background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 100%, 40px 40px;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(6,182,212,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,.04) 1px, transparent 1px),
    linear-gradient(rgba(6,182,212,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,.025) 1px, transparent 1px);
  background-size: 80px 80px, 80px 80px, 20px 20px, 20px 20px;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(ellipse 300px 200px at 20% 30%, rgba(6,182,212,.07) 0%, transparent 70%),
    radial-gradient(ellipse 250px 180px at 75% 65%, rgba(16,185,129,.07) 0%, transparent 70%),
    radial-gradient(ellipse 200px 150px at 50% 20%, rgba(239,68,68,.05)  0%, transparent 65%);
}
.find-header, .container { position: relative; z-index: 1; }
.modal { position: fixed !important; z-index: 1055 !important; }
.modal-backdrop { z-index: 1050 !important; }
.find-header { background: transparent !important; }

/* ── SIDEBAR NAV ── */
.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 260px;
  background: #0B1226;
  border-right: 1px solid rgba(255,255,255,.06);
  display: flex;
  flex-direction: column;
  z-index: 10;
  overflow-y: auto;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 22px 22px 18px;
  color: #fff; font-weight: 800; font-size: 1.15rem;
}
.sidebar-brand .brand-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg,#2563EB,#22D3EE);
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem;
}
.sidebar-user {
  margin: 0 16px 18px;
  padding: 12px 14px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-user .avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg,#7C3AED,#2563EB);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: .9rem; flex-shrink: 0;
}
.sidebar-user .u-name { color: #E2E8F0; font-weight: 600; font-size: .88rem; line-height: 1.2; }
.sidebar-user .u-role { color: #64748B; font-size: .74rem; }
.sidebar-section-label {
  padding: 4px 22px; margin-top: 10px; margin-bottom: 4px;
  font-size: .68rem; letter-spacing: .8px; text-transform: uppercase;
  color: #475569; font-weight: 700;
}
.sidebar-link {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 22px;
  margin: 2px 12px;
  border-radius: 10px;
  color: rgba(255,255,255,.65);
  font-size: .9rem; font-weight: 500;
  text-decoration: none;
  border: none; background: none; width: calc(100% - 24px); text-align: left;
  cursor: pointer;
  transition: all .18s ease;
}
.sidebar-link i { width: 18px; text-align: center; font-size: .95rem; }
.sidebar-link:hover { background: rgba(255,255,255,.06); color: #fff; }
.sidebar-link.active { background: linear-gradient(135deg,#2563EB,#0E7490); color: #fff; box-shadow: 0 4px 16px rgba(37,99,235,.35); }
.sidebar-link.danger { color: #FCA5A5; }
.sidebar-link.danger:hover { background: rgba(220,38,38,.15); color: #FCA5A5; }
.sidebar-link.blood { color: #FDA4AF; }
.sidebar-link.blood:hover { background: rgba(225,29,72,.15); }
.sidebar-link.amber { color: #FCD34D; }
.sidebar-link.amber:hover { background: rgba(217,119,6,.15); }
.sidebar-logout {
  margin-top: auto;
  padding: 16px 22px;
  border-top: 1px solid rgba(255,255,255,.06);
}
.sidebar-logout button {
  width: 100%;
  background: rgba(255,255,255,.06);
  color: #E2E8F0; border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px; padding: 9px; font-size: .85rem; font-weight: 600;
}
.sidebar-logout button:hover { background: rgba(255,255,255,.1); }

.main-content { margin-left: 260px; position: relative; z-index: 1; }

@media (max-width: 991px) {
  .sidebar { transform: translateX(-100%); transition: transform .25s ease; }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .mobile-topbar {
    display: flex; align-items: center; justify-content: space-between;
    background: #0B1226; padding: 14px 18px; position: relative; z-index: 1;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
}
@media (min-width: 992px) {
  .mobile-topbar { display: none; }
}
.mobile-topbar .brand { color: #fff; font-weight: 800; display: flex; align-items: center; gap: 8px; }
.mobile-topbar button { background: none; border: none; color: #fff; font-size: 1.3rem; }

.find-header {
  padding: 42px 0 32px;
  color: #fff;
  background: linear-gradient(135deg, #0F172A 0%, #0E7490 45%, #2563EB 100%);
  position: relative;
  overflow: hidden;
}
.find-header::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 400px 200px at 80% 50%, rgba(16,185,129,.18) 0%, transparent 65%),
    radial-gradient(ellipse 300px 200px at 10% 80%, rgba(239,68,68,.12) 0%, transparent 60%);
}
.find-header > .container { position: relative; z-index: 1; }
.find-header h2 { font-weight: 800; font-size: 2.2rem; letter-spacing: -.02em; }
.find-header p  { color: rgba(255,255,255,.72); margin-bottom: 0; }
.filter-bar {
  background: rgba(255,255,255,.05);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
  padding: 24px 28px 18px;
  margin-bottom: 32px;
}
.filter-bar .form-control,
.filter-bar .form-select {
  background: rgba(255,255,255,.07);
  border: 1.5px solid rgba(255,255,255,.1);
  color: #E2E8F0;
  border-radius: 10px;
  font-size: .88rem;
}
.filter-bar .form-control::placeholder { color: #475569; }
.filter-bar .form-control:focus,
.filter-bar .form-select:focus {
  border-color: #22D3EE;
  box-shadow: 0 0 0 3px rgba(6,182,212,.15);
  background: rgba(255,255,255,.1);
}
.filter-bar .form-select option { background: #0F172A; color: #E2E8F0; }
.filter-bar label { color: rgba(255,255,255,.6); font-size: .82rem; font-weight: 500; }
.filter-bar .input-group-text {
  background: rgba(255,255,255,.07);
  border: 1.5px solid rgba(255,255,255,.1);
  border-right: none;
  color: #475569;
  border-radius: 10px 0 0 10px;
}
.filter-bar .input-group .form-control {
  border-left: none;
  border-radius: 0 10px 10px 0;
}
.view-toggle-btn {
  border-radius: 10px !important;
  font-weight: 600;
  font-size: .82rem;
  border-color: rgba(255,255,255,.3) !important;
  color: rgba(255,255,255,.8) !important;
  padding: 7px 18px;
}
.view-toggle-btn.active {
  background: linear-gradient(135deg,#2563EB,#7C3AED) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 4px 16px rgba(37,99,235,.45);
}
.results-bar { font-size: .85rem; color: rgba(255,255,255,.45); margin-bottom: 18px; }
.results-bar span { font-weight: 700; color: #22D3EE; }
.doctor-card {
  border-radius: 22px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(13,20,45,.75);
  backdrop-filter: blur(14px);
  display: flex;
  flex-direction: column;
  height: 100%;
  transition: transform .3s ease, box-shadow .3s ease;
  position: relative;
  box-shadow: 0 4px 16px rgba(0,0,0,.06);
}
.doctor-card:hover { transform: translateY(-8px); }
.doctor-card.glow-blue:hover  { box-shadow: 0 20px 45px rgba(37,99,235,.18);  border-color: rgba(37,99,235,.2); }
.doctor-card.glow-purple:hover{ box-shadow: 0 20px 45px rgba(124,58,237,.18); border-color: rgba(124,58,237,.2); }
.doctor-card.glow-cyan:hover  { box-shadow: 0 20px 45px rgba(6,182,212,.18);  border-color: rgba(6,182,212,.2); }
.doctor-card.glow-green:hover { box-shadow: 0 20px 45px rgba(16,185,129,.18); border-color: rgba(16,185,129,.2); }
.doctor-card.glow-amber:hover { box-shadow: 0 20px 45px rgba(217,119,6,.18);  border-color: rgba(217,119,6,.2); }
.doctor-card.glow-red:hover   { box-shadow: 0 20px 45px rgba(220,38,38,.18);  border-color: rgba(220,38,38,.2); }
.dc-banner {
  height: 80px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.dc-banner.b-blue   { background: linear-gradient(135deg,#1D4ED8,#3B82F6); }
.dc-banner.b-purple { background: linear-gradient(135deg,#5B21B6,#8B5CF6); }
.dc-banner.b-cyan   { background: linear-gradient(135deg,#0E7490,#22D3EE); }
.dc-banner.b-green  { background: linear-gradient(135deg,#065F46,#34D399); }
.dc-banner.b-amber  { background: linear-gradient(135deg,#92400E,#FCD34D); }
.dc-banner.b-red    { background: linear-gradient(135deg,#991B1B,#F87171); }
.dc-banner::after {
  content:'';
  position:absolute; inset:0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  opacity:.25;
}
.dc-avatar-wrap {
  width: 80px; height: 80px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: absolute;
  bottom: -36px; left: 50%; transform: translateX(-50%);
  border: 3px solid rgba(255,255,255,.2);
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  font-size: 2.2rem;
  color: #fff;
  z-index: 2;
}
.dc-avatar-wrap.av-blue   { background: linear-gradient(135deg,#1D4ED8,#60A5FA); }
.dc-avatar-wrap.av-purple { background: linear-gradient(135deg,#5B21B6,#A78BFA); }
.dc-avatar-wrap.av-cyan   { background: linear-gradient(135deg,#0E7490,#67E8F9); }
.dc-avatar-wrap.av-green  { background: linear-gradient(135deg,#065F46,#6EE7B7); }
.dc-avatar-wrap.av-amber  { background: linear-gradient(135deg,#92400E,#FDE68A); }
.dc-avatar-wrap.av-red    { background: linear-gradient(135deg,#991B1B,#FCA5A5); }
.dc-avatar-wrap img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
.dc-body {
  padding: 48px 22px 22px;
  display: flex; flex-direction: column; flex: 1;
  text-align: center;
}
.dc-name { font-size: 1.05rem; font-weight: 700; color: #F1F5F9; margin-bottom: 6px; }
.spec-badge {
  display: inline-block;
  padding: 3px 14px;
  border-radius: 50px;
  font-size: .70rem; font-weight: 700;
  letter-spacing: .5px;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.sb-blue   { background: rgba(37,99,235,.2);  color: #93C5FD; border: 1px solid rgba(37,99,235,.4); }
.sb-purple { background: rgba(124,58,237,.2); color: #C4B5FD; border: 1px solid rgba(124,58,237,.4); }
.sb-cyan   { background: rgba(6,182,212,.2);  color: #67E8F9; border: 1px solid rgba(6,182,212,.4); }
.sb-green  { background: rgba(16,185,129,.2); color: #6EE7B7; border: 1px solid rgba(16,185,129,.4); }
.sb-amber  { background: rgba(217,119,6,.2);  color: #FDE68A; border: 1px solid rgba(217,119,6,.4); }
.sb-red    { background: rgba(220,38,38,.2);  color: #FCA5A5; border: 1px solid rgba(220,38,38,.4); }
.dc-stars { font-size: .85rem; color: #F59E0B; margin-bottom: 10px; }
.dc-stars .rev-count { color: #94A3B8; font-size: .75rem; margin-left: 4px; }
.dc-meta {
  font-size: .82rem; color: rgba(255,255,255,.5);
  margin-bottom: 4px; text-align: left;
  display: flex; align-items: center; gap: 8px;
}
.dc-meta i { width: 14px; text-align: center; color: #22D3EE; }
.dc-fee-badge {
  display: inline-block;
  background: rgba(99,102,241,.15);
  border: 1px solid rgba(99,102,241,.3);
  color: #A5B4FC;
  border-radius: 8px;
  padding: 5px 16px;
  font-size: .85rem; font-weight: 600;
  margin: 8px 0 16px;
}
.dc-actions { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
.btn-book-doc {
  background: linear-gradient(135deg,#2563EB,#7C3AED);
  color: #fff; border: none;
  border-radius: 11px;
  font-weight: 600; padding: 11px;
  transition: all .25s ease; font-size: .88rem;
  cursor: pointer; width: 100%;
}
.btn-book-doc:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(124,58,237,.45);
}
.btn-view-profile {
  background: rgba(255,255,255,.05);
  color: #22D3EE;
  border: 1.5px solid rgba(6,182,212,.3);
  border-radius: 11px;
  font-weight: 600; padding: 10px;
  transition: all .25s ease; font-size: .88rem;
  text-decoration: none; display: block;
}
.btn-view-profile:hover {
  background: rgba(6,182,212,.1);
  color: #67E8F9;
  border-color: rgba(6,182,212,.5);
}
.doctorsMap {
  height: 460px; border-radius: 20px; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.4);
  border: 1px solid rgba(255,255,255,.1);
  margin-bottom: 32px;
}
.modal-content {
  background: #fff;
  border: none;
  border-radius: 22px !important;
  box-shadow: 0 25px 60px rgba(0,0,0,.18);
}
.modal-header {
  background: linear-gradient(135deg, #0F172A 0%, #0E7490 50%, #2563EB 100%);
  border-radius: 21px 21px 0 0;
  border-bottom: none;
}
.modal-body .form-control {
  background: #F8FAFC;
  border: 1.5px solid #E2E8F0;
  color: #1E293B; border-radius: 10px;
}
.modal-body .form-control:focus {
  border-color: #0E7490;
  box-shadow: 0 0 0 3px rgba(14,116,144,.12);
  background: #fff;
}
.modal-body .form-control::placeholder { color: #94A3B8; }
.modal-body label { color: #475569; }
.modal-info-box {
  background: linear-gradient(135deg, #F0FDFA, #EFF6FF);
  border: 1px solid #A7F3D0;
  border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
}
.modal-doc-icon {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg,#2563EB,#7C3AED);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 1.2rem; flex-shrink: 0;
}
</style>
</head>
<body>

<!-- Mobile top bar (shown only on small screens) -->
<div class="mobile-topbar">
  <div class="brand"><i class="fa-solid fa-heart-pulse"></i> Vaidyo</div>
  <button onclick="document.getElementById('sidebar').classList.toggle('open')">
    <i class="fa-solid fa-bars"></i>
  </button>
</div>

<!-- Sidebar Nav (replaces top navbar) -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="fa-solid fa-heart-pulse"></i></div>
    Vaidyo
  </div>

  <div class="sidebar-user">
    <div class="avatar"><i class="fa-solid fa-user"></i></div>
    <div>
      <div class="u-name">Patient</div>
      <div class="u-role">Patient Account</div>
    </div>
  </div>

  <div class="sidebar-section-label">Main Menu</div>
  <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-house"></i> Dashboard</a>
  <a href="doctors.html" class="sidebar-link active"><i class="fa-solid fa-stethoscope"></i> Find Doctors</a>
  <a href="appointments.html" class="sidebar-link"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
  <a href="medicines.html" class="sidebar-link"><i class="fa-solid fa-pills"></i> Medicines</a>
  <a href="health.html" class="sidebar-link"><i class="fa-solid fa-heart-pulse"></i> Health</a>

  <div class="sidebar-logout">
    <button onclick="logout()"><i class="fa-solid fa-right-from-bracket me-1"></i> Logout</button>
  </div>
</aside>

<div class="main-content">

<div class="find-header">
  <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
    <div>
      <h2><i class="fa-solid fa-stethoscope me-2" style="color:#60A5FA;"></i>Find a Doctor</h2>
      <p>Search, filter, and book a visit with a verified doctor near you.</p>
    </div>
    <div class="btn-group" role="group">
      <button type="button" id="gridViewBtn" class="btn view-toggle-btn active">
        <i class="fa-solid fa-table-cells-large me-1"></i> Grid
      </button>
      <button type="button" id="mapViewBtn" class="btn view-toggle-btn">
        <i class="fa-solid fa-map-location-dot me-1"></i> Map
      </button>
    </div>
  </div>
</div>

<div class="container py-4">

  <div class="filter-bar">
    <div class="row g-2 mb-3">
      <div class="col-12">
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
          <input type="text" class="form-control" id="searchInput" placeholder="Search doctor by name…">
        </div>
      </div>
    </div>
    <div class="row g-2 align-items-end">
      <div class="col-6 col-md-3">
        <label class="form-label mb-1">Specialization</label>
        <select class="form-select" id="specialityFilter">
          <option value="">All Specialities</option>
          <option value="GENERAL">General</option>
          <option value="CARDIOLOGY">Cardiology</option>
          <option value="ORTHOPEDICS">Orthopedics</option>
          <option value="DIABETOLOGY">Diabetology</option>
          <option value="NEUROLOGY">Neurology</option>
          <option value="DERMATOLOGY">Dermatology</option>
          <option value="ENT">ENT</option>
          <option value="OPHTHALMOLOGY">Ophthalmology</option>
          <option value="GYNECOLOGY">Gynecology</option>
          <option value="PEDIATRICS">Pediatrics</option>
          <option value="PSYCHIATRY">Psychiatry</option>
          <option value="UROLOGY">Urology</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label mb-1">Experience (yrs)</label>
        <div class="d-flex gap-1">
          <input type="number" min="0" max="30" class="form-control" id="expMin" placeholder="Min">
          <input type="number" min="0" max="30" class="form-control" id="expMax" placeholder="Max">
        </div>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label mb-1">Fee (₹)</label>
        <div class="d-flex gap-1">
          <input type="number" min="0" class="form-control" id="feeMin" placeholder="Min">
          <input type="number" min="0" class="form-control" id="feeMax" placeholder="Max">
        </div>
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label mb-1">Rating</label>
        <select class="form-select" id="ratingFilter">
          <option value="0">Any Rating</option>
          <option value="3">3★ and up</option>
          <option value="4">4★ and up</option>
          <option value="5">5★ only</option>
        </select>
      </div>
      <div class="col-12 col-md-1">
        <button class="btn btn-primary w-100" id="applyFiltersBtn" style="border-radius:10px;padding:9px;" title="Apply">
          <i class="fa-solid fa-sliders"></i>
        </button>
      </div>
    </div>
    <div class="d-flex justify-content-end mt-2">
      <button class="btn btn-sm btn-outline-secondary" id="clearFiltersBtn" style="border-radius:8px;">
        <i class="fa-solid fa-xmark me-1"></i>Clear Filters
      </button>
    </div>
  </div>

  <div class="results-bar" id="resultsBar"></div>

  <div class="row g-4" id="doctorGrid">
    <div class="col-12 text-center py-5 text-muted">
      <div class="spinner-border text-primary mb-3" role="status"></div>
      <p>Loading doctors…</p>
    </div>
  </div>

  <div id="doctorsMap" class="doctorsMap d-none"></div>

</div>

</div><!-- /.main-content -->

<!-- Book Modal -->
<div class="modal fade" id="bookModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-white fw-bold">
          <i class="fa-solid fa-calendar-check me-2"></i>Book Home Visit
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <div class="modal-info-box">
          <div class="modal-doc-icon"><i class="fa-solid fa-user-doctor"></i></div>
          <div>
            <p id="bookDoctorName" class="fw-bold mb-0" style="color:#1E293B;"></p>
            <p style="color:#64748B;font-size:.8rem;margin:0;">Home Visit Appointment</p>
          </div>
        </div>
        <form id="bookForm">
          <input type="hidden" id="bookDoctorId">
          <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-location-dot me-1" style="color:#60A5FA;"></i>Your Address</label>
            <textarea class="form-control" id="patientAddress" rows="2" required placeholder="Enter your full address…"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-notes-medical me-1" style="color:#60A5FA;"></i>Symptoms</label>
            <textarea class="form-control" id="symptoms" rows="3" required placeholder="Describe your symptoms…"></textarea>
          </div>
          <button type="submit" class="btn-book-doc mt-1">
            <i class="fa-solid fa-paper-plane me-2"></i>Submit Request
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
if (!checkAuth('PATIENT')) { }
const auth = getAuth();

const SPEC_COLORS = {
  GENERAL:      { banner:'b-blue',   badge:'sb-blue',   glow:'glow-blue',   av:'av-blue'   },
  CARDIOLOGY:   { banner:'b-red',    badge:'sb-red',    glow:'glow-red',    av:'av-red'    },
  ORTHOPEDICS:  { banner:'b-cyan',   badge:'sb-cyan',   glow:'glow-cyan',   av:'av-cyan'   },
  DIABETOLOGY:  { banner:'b-amber',  badge:'sb-amber',  glow:'glow-amber',  av:'av-amber'  },
  NEUROLOGY:    { banner:'b-purple', badge:'sb-purple', glow:'glow-purple', av:'av-purple' },
  DERMATOLOGY:  { banner:'b-green',  badge:'sb-green',  glow:'glow-green',  av:'av-green'  },
  ENT:          { banner:'b-blue',   badge:'sb-blue',   glow:'glow-blue',   av:'av-blue'   },
  OPHTHALMOLOGY:{ banner:'b-cyan',   badge:'sb-cyan',   glow:'glow-cyan',   av:'av-cyan'   },
  GYNECOLOGY:   { banner:'b-red',    badge:'sb-red',    glow:'glow-red',    av:'av-red'    },
  PEDIATRICS:   { banner:'b-green',  badge:'sb-green',  glow:'glow-green',  av:'av-green'  },
  PSYCHIATRY:   { banner:'b-amber',  badge:'sb-amber',  glow:'glow-amber',  av:'av-amber'  },
  UROLOGY:      { banner:'b-purple', badge:'sb-purple', glow:'glow-purple', av:'av-purple' },
};
function col(spec){ return SPEC_COLORS[spec] || SPEC_COLORS.GENERAL; }

let allDoctors = [], currentFiltered = [], leafletMap = null, mapMarkers = [];

function esc(s){ if(!s)return''; return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function stars(r){
  r = r || 0; let h = '';
  for(let i = 1; i <= 5; i++) h += `<i class="fa-${i <= Math.round(r) ? 'solid' : 'regular'} fa-star"></i>`;
  return h;
}

/* ─── MODAL FIX: force-clean Bootstrap state before every open ─── */
function forceCleanModal() {
  // Remove any leftover backdrop divs Bootstrap forgot to clean up
  document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
  // Remove the class Bootstrap adds to body when modal is open
  document.body.classList.remove('modal-open');
  // Remove inline styles Bootstrap adds to body
  document.body.style.removeProperty('overflow');
  document.body.style.removeProperty('padding-right');
}

function openBookModal(id, name) {
  document.getElementById('bookForm').reset();
  document.getElementById('bookDoctorId').value = id;
  document.getElementById('bookDoctorName').textContent = 'Dr. ' + name;

  // Step 1: destroy any existing Bootstrap modal instance on this element
  const modalEl = document.getElementById('bookModal');
  const existing = bootstrap.Modal.getInstance(modalEl);
  if (existing) existing.dispose();

  // Step 2: force-clean any leftover backdrop / body styles
  forceCleanModal();

  // Step 3: create a fresh instance and show it
  new bootstrap.Modal(modalEl).show();
}

function closeBookModal() {
  const modalEl = document.getElementById('bookModal');
  const inst = bootstrap.Modal.getInstance(modalEl);
  if (inst) {
    inst.hide();
  }
  // Safety net — clean up even if hide() didn't fire the cleanup
  setTimeout(forceCleanModal, 350);
}

/* ─── Load & render doctors ─── */
async function loadDoctors(){
  try {
    allDoctors = await apiGet('/api/patient/doctors');
    currentFiltered = allDoctors;
    renderDoctors(currentFiltered);
  } catch {
    document.getElementById('doctorGrid').innerHTML = '<p class="text-danger text-center py-4">Failed to load doctors.</p>';
  }
}

function renderDoctors(doctors){
  const grid = document.getElementById('doctorGrid');
  const bar  = document.getElementById('resultsBar');
  bar.innerHTML = `Showing <span>${doctors.length}</span> doctor${doctors.length !== 1 ? 's' : ''}`;
  if (!doctors.length) {
    grid.innerHTML = `<div class="col-12 text-center py-5 text-muted">
      <i class="fa-solid fa-user-doctor fa-3x mb-3 opacity-25"></i><p>No doctors match your filters.</p></div>`;
    return;
  }
  grid.innerHTML = doctors.map(d => {
    const c = col(d.speciality), name = esc(d.fullName), hasR = d.avgRating != null;
    return `
    <div class="col-md-4 col-sm-6">
      <div class="doctor-card ${c.glow}">
        <div class="dc-banner ${c.banner}">
          <div class="dc-avatar-wrap ${c.av}">
            ${d.profilePhoto
              ? `<img src="${esc(d.profilePhoto)}" alt="Dr. ${name}">`
              : `<i class="fa-solid fa-user-doctor"></i>`}
          </div>
        </div>
        <div class="dc-body">
          <p class="dc-name">Dr. ${name}</p>
          <div><span class="spec-badge ${c.badge}">${d.speciality}</span></div>
          ${hasR ? `<div class="dc-stars">${stars(d.avgRating)}<span class="rev-count">(${d.reviewCount || 0})</span></div>` : ''}
          <div class="mb-1">
            <p class="dc-meta"><i class="fa-solid fa-briefcase-medical"></i>${d.experienceYears || 0} yrs experience</p>
            ${d.location ? `<p class="dc-meta"><i class="fa-solid fa-location-dot"></i>${esc(d.location)}</p>` : ''}
          </div>
          <div class="text-center">
            <span class="dc-fee-badge"><i class="fa-solid fa-rupee-sign me-1"></i>₹${d.consultationFee || 0} per visit</span>
          </div>
          <div class="dc-actions">
            <button class="btn-book-doc btn-book" data-id="${d.userId}" data-name="${name}">
              <i class="fa-solid fa-calendar-check me-2"></i>Book Appointment
            </button>
            <a class="btn-view-profile" href="doctor-profile.html?id=${d.userId}">
              <i class="fa-solid fa-eye me-2"></i>View Profile
            </a>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('doctorGrid').addEventListener('click', e => {
  const btn = e.target.closest('.btn-book');
  if (btn) openBookModal(btn.dataset.id, btn.dataset.name);
});

/* ─── Filters ─── */
document.getElementById('searchInput').addEventListener('input', filterDoctors);
document.getElementById('applyFiltersBtn').addEventListener('click', filterDoctors);
document.getElementById('clearFiltersBtn').addEventListener('click', clearFilters);

function filterDoctors(){
  const search  = document.getElementById('searchInput').value.toLowerCase();
  const spec    = document.getElementById('specialityFilter').value;
  const expMin  = parseFloat(document.getElementById('expMin').value) || 0;
  const expMax  = parseFloat(document.getElementById('expMax').value) || Infinity;
  const feeMin  = parseFloat(document.getElementById('feeMin').value) || 0;
  const feeMax  = parseFloat(document.getElementById('feeMax').value) || Infinity;
  const minStar = parseFloat(document.getElementById('ratingFilter').value) || 0;
  currentFiltered = allDoctors.filter(d => {
    const r = d.avgRating || 0;
    return d.fullName.toLowerCase().includes(search)
      && (!spec || d.speciality === spec)
      && (d.experienceYears || 0) >= expMin && (d.experienceYears || 0) <= expMax
      && (d.consultationFee  || 0) >= feeMin && (d.consultationFee  || 0) <= feeMax
      && (minStar === 0 || (minStar === 5 ? r >= 5 : r >= minStar));
  });
  renderDoctors(currentFiltered);
  if (leafletMap) updateMapMarkers(currentFiltered);
}

function clearFilters(){
  ['searchInput','expMin','expMax','feeMin','feeMax'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('specialityFilter').value = '';
  document.getElementById('ratingFilter').value = '0';
  currentFiltered = allDoctors;
  renderDoctors(currentFiltered);
  if (leafletMap) updateMapMarkers(currentFiltered);
}

/* ─── Form submit ─── */
document.getElementById('bookForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const payload = {
    doctorId:       parseInt(document.getElementById('bookDoctorId').value),
    patientAddress: document.getElementById('patientAddress').value,
    symptoms:       document.getElementById('symptoms').value
  };
  showLoading();
  try {
    await apiPost('/api/patient/appointments?patientId=' + (localStorage.getItem('userId') || auth.userId), payload);
    hideLoading();
    showSuccess('Appointment request sent!');
    closeBookModal();
  } catch {
    hideLoading();
    showError('Failed to book appointment.');
  }
});

/* ─── View toggle ─── */
document.getElementById('gridViewBtn').addEventListener('click', () => setView('grid'));
document.getElementById('mapViewBtn').addEventListener('click',  () => setView('map'));

function setView(v){
  const isMap = v === 'map';
  document.getElementById('doctorGrid').classList.toggle('d-none',  isMap);
  document.getElementById('doctorsMap').classList.toggle('d-none', !isMap);
  document.getElementById('gridViewBtn').classList.toggle('active', !isMap);
  document.getElementById('mapViewBtn').classList.toggle('active',   isMap);
  if (isMap) {
    initMap();
    setTimeout(() => leafletMap && leafletMap.invalidateSize(), 200);
    updateMapMarkers(currentFiltered);
  }
}

function initMap(){
  if (leafletMap) return;
  leafletMap = L.map('doctorsMap').setView([20.5937, 78.9629], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(leafletMap);
}

function updateMapMarkers(doctors){
  if (!leafletMap) return;
  mapMarkers.forEach(m => leafletMap.removeLayer(m));
  mapMarkers = [];
  doctors.forEach(d => {
    if (d.latitude && d.longitude) {
      const m = L.marker([d.latitude, d.longitude]).addTo(leafletMap)
        .bindPopup(`<strong>Dr. ${esc(d.fullName)}</strong><br>${d.speciality}<br>₹${d.consultationFee || 0}`);
      mapMarkers.push(m);
    }
  });
}
document.getElementById('bookModal').addEventListener('hidden.bs.modal', function(){
  document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
  document.body.classList.remove('modal-open');
  document.body.style.removeProperty('overflow');
  document.body.style.removeProperty('padding-right');
});

loadDoctors();


</script>
</body>
</html>
