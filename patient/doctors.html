<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Doctors - Vaidyo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-vaidyo">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-heart-pulse"></i> Vaidyo</a>
    <div class="ms-auto d-flex gap-2">
      <a href="dashboard.html" class="btn btn-sm btn-outline-light">Dashboard</a>
      <a href="medicines.html" class="btn btn-sm btn-outline-light">Medicines</a>
      <a href="health.html" class="btn btn-sm btn-outline-light">Health</a>
      <a href="appointments.html" class="btn btn-sm btn-outline-light">Appointments</a>
      <button class="btn btn-sm btn-light" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container my-4">

  <div class="card-custom mb-4">
    <div class="row g-2">
      <div class="col-md-8">
        <input type="text" class="form-control" id="searchInput" placeholder="Search doctor by name...">
      </div>
      <div class="col-md-4">
        <select class="form-select" id="specialityFilter">
          <option value="">All Specialities</option>
          <option value="GENERAL">General</option>
          <option value="CARDIOLOGY">Cardiology</option>
          <option value="ORTHOPEDICS">Orthopedics</option>
          <option value="DIABETOLOGY">Diabetology</option>
          <option value="NEUROLOGY">Neurology</option>
          <option value="DERMATOLOGY">Dermatology</option>
          <option value="ENT">ENT</option>
          <option value="OPHTHALMOLOGY">Ophthalmology</option>
          <option value="GYNECOLOGY">Gynecology</option>
          <option value="PEDIATRICS">Pediatrics</option>
          <option value="PSYCHIATRY">Psychiatry</option>
          <option value="UROLOGY">Urology</option>
        </select>
      </div>
    </div>
  </div>

  <div class="row g-3" id="doctorGrid">
    <p class="text-muted text-center">Loading doctors...</p>
  </div>

</div>

<!-- Book Appointment Modal -->
<div class="modal fade" id="bookModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Book Home Visit</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p id="bookDoctorName" class="fw-bold"></p>
        <form id="bookForm">
          <input type="hidden" id="bookDoctorId">
          <div class="mb-3">
            <label class="form-label">Your Address</label>
            <textarea class="form-control" id="patientAddress" rows="2" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Symptoms</label>
            <textarea class="form-control" id="symptoms" rows="3" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">Submit Request</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
if (!checkAuth('PATIENT')) { }
const auth = getAuth();

let allDoctors = [];

async function loadDoctors() {
    try {
        allDoctors = await apiGet('/api/patient/doctors');
        renderDoctors(allDoctors);
    } catch (e) {
        document.getElementById('doctorGrid').innerHTML = '<p class="text-danger text-center">Failed to load doctors.</p>';
    }
}

function renderDoctors(doctors) {
    if (doctors.length === 0) {
        document.getElementById('doctorGrid').innerHTML = '<p class="text-muted text-center">No doctors found.</p>';
        return;
    }
    let html = '';
    doctors.forEach(d => {
        html += '<div class="col-md-4">'
            + '<div class="card-custom h-100">'
            + '<div class="text-center mb-2"><i class="fa-solid fa-user-doctor fs-1 text-primary"></i></div>'
            + '<h5 class="text-center">Dr. ' + d.fullName + '</h5>'
            + '<p class="text-center"><span class="badge bg-info">' + d.speciality + '</span></p>'
            + '<p class="small text-muted mb-1"><i class="fa-solid fa-briefcase-medical"></i> ' + (d.experienceYears || 0) + ' years experience</p>'
            + '<p class="small text-muted mb-3"><i class="fa-solid fa-rupee-sign"></i> Fee: ₹' + (d.consultationFee || 0) + '</p>'
            + '<button class="btn btn-primary w-100" onclick="openBookModal(' + d.userId + ', \'' + d.fullName.replace(/'/g, "\\'") + '\')">Book Home Visit</button>'
            + '</div>'
            + '</div>';
    });
    document.getElementById('doctorGrid').innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', filterDoctors);
document.getElementById('specialityFilter').addEventListener('change', filterDoctors);

function filterDoctors() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const speciality = document.getElementById('specialityFilter').value;

    let filtered = allDoctors.filter(d => {
        const matchName = d.fullName.toLowerCase().includes(search);
        const matchSpeciality = !speciality || d.speciality === speciality;
        return matchName && matchSpeciality;
    });
    renderDoctors(filtered);
}

function openBookModal(doctorId, doctorName) {
    document.getElementById('bookDoctorId').value = doctorId;
    document.getElementById('bookDoctorName').textContent = 'Dr. ' + doctorName;
    document.getElementById('bookForm').reset();
    document.getElementById('bookDoctorId').value = doctorId;
    new bootstrap.Modal(document.getElementById('bookModal')).show();
}

document.getElementById('bookForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const payload = {
        doctorId: parseInt(document.getElementById('bookDoctorId').value),
        patientAddress: document.getElementById('patientAddress').value,
        symptoms: document.getElementById('symptoms').value
    };
    showLoading();
    try {
        await apiPost('/api/patient/appointments?patientId=' + auth.userId, payload);
        hideLoading();
        showSuccess('Appointment request sent!');
        bootstrap.Modal.getInstance(document.getElementById('bookModal')).hide();
    } catch (err) {
        hideLoading();
        showError('Failed to book appointment.');
    }
});

loadDoctors();
</script>

</body>
</html>
