<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointments - Vaidyo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-vaidyo">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-heart-pulse"></i> Vaidyo</a>
    <div class="ms-auto d-flex gap-2">
      <a href="dashboard.html" class="btn btn-sm btn-outline-light">Dashboard</a>
      <a href="medicines.html" class="btn btn-sm btn-outline-light">Medicines</a>
      <a href="health.html" class="btn btn-sm btn-outline-light">Health</a>
      <a href="doctors.html" class="btn btn-sm btn-outline-light">Doctors</a>
      <button class="btn btn-sm btn-light" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container my-4">

  <div class="card-custom">
    <h5><i class="fa-solid fa-calendar-check"></i> My Appointments</h5>
    <div id="apptList" class="mt-3">
      <p class="text-muted text-center">Loading...</p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
if (!checkAuth('PATIENT')) { }
const auth = getAuth();

async function loadAppointments() {
    try {
        const appts = await apiGet('/api/patient/appointments?patientId=' + auth.userId);
        if (appts.length === 0) {
            document.getElementById('apptList').innerHTML = '<p class="text-muted text-center">No appointments yet. Book one from the Doctors page.</p>';
            return;
        }

        let html = '';
        appts.forEach(a => {
            html += '<div class="card-custom mb-3">'
                + '<div class="row align-items-center">'
                + '<div class="col-md-3"><strong>' + a.doctorName + '</strong><br><span class="badge bg-info">' + a.speciality + '</span></div>'
                + '<div class="col-md-2">' + getStatusBadge(a.status) + '</div>'
                + '<div class="col-md-3"><small class="text-muted">Requested:</small><br>' + formatDate(a.createdAt) + '</div>'
                + '<div class="col-md-4" id="apptAction' + a.id + '"></div>'
                + '</div>'
                + '</div>';
        });
        document.getElementById('apptList').innerHTML = html;

        // Now fill action columns for REPLIED appointments
        appts.forEach(a => {
            const actionDiv = document.getElementById('apptAction' + a.id);
            if (a.status === 'REPLIED') {
                actionDiv.innerHTML =
                    '<div class="small mb-2"><i class="fa-solid fa-calendar"></i> ' + formatDate(a.scheduledAt)
                    + '<br><i class="fa-solid fa-rupee-sign"></i> Fee: ₹' + (a.fee || '-') + '</div>'
                    + '<button class="btn btn-sm btn-success me-2" onclick="respondAppt(' + a.id + ', \'accept\')">Accept</button>'
                    + '<button class="btn btn-sm btn-danger" onclick="respondAppt(' + a.id + ', \'reject\')">Reject</button>';
            } else if (a.status === 'CONFIRMED') {
                actionDiv.innerHTML = '<div class="small"><i class="fa-solid fa-calendar-check text-success"></i> Scheduled: ' + formatDate(a.scheduledAt) + '</div>';
            } else if (a.status === 'COMPLETED') {
                actionDiv.innerHTML = '<span class="badge bg-secondary">Visit Completed</span>';
            } else if (a.status === 'PENDING') {
                actionDiv.innerHTML = '<span class="text-muted small">Waiting for doctor response...</span>';
            } else if (a.status === 'REJECTED') {
                actionDiv.innerHTML = '<span class="text-muted small">Request was rejected.</span>';
            }
        });

    } catch (e) {
        document.getElementById('apptList').innerHTML = '<p class="text-danger text-center">Failed to load appointments.</p>';
    }
}

async function respondAppt(id, action) {
    showLoading();
    try {
        await apiPut('/api/patient/appointments/' + id + '/' + action);
        hideLoading();
        showSuccess(action === 'accept' ? 'Appointment confirmed!' : 'Appointment rejected.');
        loadAppointments();
    } catch (e) {
        hideLoading();
        showError('Failed to update appointment.');
    }
}

loadAppointments();
</script>

</body>
</html>
