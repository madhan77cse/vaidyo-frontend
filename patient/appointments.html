<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointments - Vaidyo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<style>
body {
  min-height: 100vh;
  background: #060D1F;
  background-image:
    radial-gradient(ellipse 520px 380px at -5% 0%,   rgba(6,182,212,.13)  0%, transparent 65%),
    radial-gradient(ellipse 480px 320px at 105% 5%,  rgba(239,68,68,.10)  0%, transparent 60%),
    radial-gradient(ellipse 400px 350px at 0%  55%,  rgba(16,185,129,.09) 0%, transparent 60%),
    radial-gradient(ellipse 450px 300px at 100% 50%, rgba(139,92,246,.09) 0%, transparent 55%),
    radial-gradient(ellipse 700px 350px at 50% 110%, rgba(59,130,246,.08) 0%, transparent 60%);
  background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 100%, 40px 40px;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(6,182,212,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,.04) 1px, transparent 1px),
    linear-gradient(rgba(6,182,212,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,.025) 1px, transparent 1px);
  background-size: 80px 80px, 80px 80px, 20px 20px, 20px 20px;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(ellipse 300px 200px at 20% 30%, rgba(6,182,212,.07) 0%, transparent 70%),
    radial-gradient(ellipse 250px 180px at 75% 65%, rgba(16,185,129,.07) 0%, transparent 70%),
    radial-gradient(ellipse 200px 150px at 50% 20%, rgba(239,68,68,.05)  0%, transparent 65%);
}
.container, .page-header { position: relative; z-index: 1; }

/* ── SIDEBAR NAV (same as doctors page) ── */
.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 260px;
  background: #0B1226;
  border-right: 1px solid rgba(255,255,255,.06);
  display: flex;
  flex-direction: column;
  z-index: 10;
  overflow-y: auto;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 22px 22px 18px;
  color: #fff; font-weight: 800; font-size: 1.15rem;
}
.sidebar-brand .brand-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg,#2563EB,#22D3EE);
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem;
}
.sidebar-user {
  margin: 0 16px 18px;
  padding: 12px 14px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 12px;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-user .avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg,#7C3AED,#2563EB);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: .9rem; flex-shrink: 0;
}
.sidebar-user .u-name { color: #E2E8F0; font-weight: 600; font-size: .88rem; line-height: 1.2; }
.sidebar-user .u-role { color: #64748B; font-size: .74rem; }
.sidebar-section-label {
  padding: 4px 22px; margin-top: 10px; margin-bottom: 4px;
  font-size: .68rem; letter-spacing: .8px; text-transform: uppercase;
  color: #475569; font-weight: 700;
}
.sidebar-link {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 22px;
  margin: 2px 12px;
  border-radius: 10px;
  color: rgba(255,255,255,.65);
  font-size: .9rem; font-weight: 500;
  text-decoration: none;
  border: none; background: none; width: calc(100% - 24px); text-align: left;
  cursor: pointer;
  transition: all .18s ease;
}
.sidebar-link i { width: 18px; text-align: center; font-size: .95rem; }
.sidebar-link:hover { background: rgba(255,255,255,.06); color: #fff; }
.sidebar-link.active { background: linear-gradient(135deg,#2563EB,#0E7490); color: #fff; box-shadow: 0 4px 16px rgba(37,99,235,.35); }
.sidebar-logout {
  margin-top: auto;
  padding: 16px 22px;
  border-top: 1px solid rgba(255,255,255,.06);
}
.sidebar-logout button {
  width: 100%;
  background: rgba(255,255,255,.06);
  color: #E2E8F0; border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px; padding: 9px; font-size: .85rem; font-weight: 600;
}
.sidebar-logout button:hover { background: rgba(255,255,255,.1); }

.main-content { margin-left: 260px; position: relative; z-index: 1; }

@media (max-width: 991px) {
  .sidebar { transform: translateX(-100%); transition: transform .25s ease; }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .mobile-topbar {
    display: flex; align-items: center; justify-content: space-between;
    background: #0B1226; padding: 14px 18px; position: relative; z-index: 1;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
}
@media (min-width: 992px) {
  .mobile-topbar { display: none; }
}
.mobile-topbar .brand { color: #fff; font-weight: 800; display: flex; align-items: center; gap: 8px; }
.mobile-topbar button { background: none; border: none; color: #fff; font-size: 1.3rem; }

/* ── PAGE HEADER ── */
.page-header {
  padding: 42px 0 30px;
  color: #fff;
  background: linear-gradient(135deg, #0F172A 0%, #0E7490 45%, #2563EB 100%);
  position: relative;
  overflow: hidden;
}
.page-header::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 400px 200px at 80% 50%, rgba(16,185,129,.18) 0%, transparent 65%),
    radial-gradient(ellipse 300px 200px at 10% 80%, rgba(239,68,68,.12) 0%, transparent 60%);
}
.page-header > .container { position: relative; z-index: 1; }
.page-header h2 { font-weight: 800; font-size: 2rem; letter-spacing: -.02em; margin-bottom: 4px; }
.page-header p { color: rgba(255,255,255,.72); margin-bottom: 0; }

/* ── APPOINTMENT CARDS ── */
.appt-card {
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(13,20,45,.75);
  backdrop-filter: blur(14px);
  margin-bottom: 20px;
  transition: transform .25s ease, box-shadow .25s ease;
  position: relative;
}
.appt-card:hover { transform: translateY(-4px); }
.appt-card-inner {
  display: flex; flex-wrap: wrap; align-items: center; gap: 18px;
  padding: 20px 24px;
}
.appt-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
.stripe-pending   { background: linear-gradient(#F59E0B,#D97706); }
.stripe-replied   { background: linear-gradient(#60A5FA,#2563EB); }
.stripe-confirmed { background: linear-gradient(#34D399,#059669); }
.stripe-completed { background: linear-gradient(#94A3B8,#475569); }
.stripe-rejected  { background: linear-gradient(#F87171,#DC2626); }

.appt-avatar {
  width: 54px; height: 54px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg,#2563EB,#7C3AED);
  color: #fff; font-size: 1.3rem; flex-shrink: 0;
  box-shadow: 0 6px 18px rgba(37,99,235,.35);
}
.appt-doc-name { font-weight: 700; color: #F1F5F9; font-size: 1.02rem; margin-bottom: 4px; }
.appt-spec-badge {
  display: inline-block; padding: 3px 12px; border-radius: 50px;
  font-size: .7rem; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
  background: rgba(6,182,212,.15); color: #67E8F9; border: 1px solid rgba(6,182,212,.35);
}
.appt-meta { font-size: .8rem; color: rgba(255,255,255,.45); }
.appt-meta strong { color: rgba(255,255,255,.75); }
.appt-col { min-width: 160px; }

.status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 50px;
  font-size: .76rem; font-weight: 700; letter-spacing: .3px;
}
.status-PENDING   { background: rgba(245,158,11,.15); color: #FBBF24; border: 1px solid rgba(245,158,11,.35); }
.status-REPLIED   { background: rgba(37,99,235,.15);  color: #93C5FD; border: 1px solid rgba(37,99,235,.35); }
.status-CONFIRMED { background: rgba(16,185,129,.15); color: #6EE7B7; border: 1px solid rgba(16,185,129,.35); }
.status-COMPLETED { background: rgba(148,163,184,.15);color: #CBD5E1; border: 1px solid rgba(148,163,184,.35); }
.status-REJECTED  { background: rgba(220,38,38,.15);  color: #FCA5A5; border: 1px solid rgba(220,38,38,.35); }

.appt-action-box { min-width: 220px; text-align: right; }
.appt-detail-line {
  font-size: .8rem; color: rgba(255,255,255,.55);
  display: flex; align-items: center; gap: 6px; justify-content: flex-end; margin-bottom: 4px;
}
.appt-detail-line i { color: #60A5FA; width: 14px; text-align: center; }
.btn-accept {
  background: linear-gradient(135deg,#059669,#10B981);
  color: #fff; border: none; border-radius: 9px;
  padding: 7px 16px; font-size: .82rem; font-weight: 600;
  transition: all .2s ease;
}
.btn-accept:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(16,185,129,.4); color: #fff; }
.btn-reject {
  background: rgba(220,38,38,.15);
  color: #FCA5A5; border: 1px solid rgba(220,38,38,.4); border-radius: 9px;
  padding: 7px 16px; font-size: .82rem; font-weight: 600;
  transition: all .2s ease;
}
.btn-reject:hover { background: rgba(220,38,38,.28); color: #fff; }
.text-muted-soft { color: rgba(255,255,255,.4); font-size: .82rem; }

.empty-state, .loading-state, .error-state {
  text-align: center; padding: 60px 20px; color: rgba(255,255,255,.45);
}
.empty-state i, .loading-state .spinner-border, .error-state i { margin-bottom: 14px; }
.empty-state i { font-size: 2.6rem; opacity: .3; display: block; }
.error-state i { font-size: 2.6rem; color: #F87171; display: block; }

@media (max-width: 767px) {
  .appt-card-inner { flex-direction: column; align-items: flex-start; }
  .appt-action-box { text-align: left; width: 100%; }
  .appt-detail-line { justify-content: flex-start; }
}
</style>
</head>
<body>

<!-- Mobile top bar -->
<div class="mobile-topbar">
  <div class="brand"><i class="fa-solid fa-heart-pulse"></i> Vaidyo</div>
  <button onclick="document.getElementById('sidebar').classList.toggle('open')">
    <i class="fa-solid fa-bars"></i>
  </button>
</div>

<!-- Sidebar Nav -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="fa-solid fa-heart-pulse"></i></div>
    Vaidyo
  </div>

  <div class="sidebar-user">
    <div class="avatar"><i class="fa-solid fa-user"></i></div>
    <div>
      <div class="u-name">Patient</div>
      <div class="u-role">Patient Account</div>
    </div>
  </div>

  <div class="sidebar-section-label">Main Menu</div>
  <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-house"></i> Dashboard</a>
  <a href="doctors.html" class="sidebar-link"><i class="fa-solid fa-stethoscope"></i> Find Doctors</a>
  <a href="appointments.html" class="sidebar-link active"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
  <a href="medicines.html" class="sidebar-link"><i class="fa-solid fa-pills"></i> Medicines</a>
  <a href="health.html" class="sidebar-link"><i class="fa-solid fa-heart-pulse"></i> Health</a>

  <div class="sidebar-logout">
    <button onclick="logout()"><i class="fa-solid fa-right-from-bracket me-1"></i> Logout</button>
  </div>
</aside>

<div class="main-content">

  <div class="page-header">
    <div class="container">
      <h2><i class="fa-solid fa-calendar-check me-2" style="color:#60A5FA;"></i>My Appointments</h2>
      <p>Track your requests, confirmations, and visit history in one place.</p>
    </div>
  </div>

  <div class="container py-4">
    <div id="apptList">
      <div class="loading-state">
        <div class="spinner-border text-info" role="status"></div>
        <p class="mt-2">Loading appointments…</p>
      </div>
    </div>
  </div>

</div><!-- /.main-content -->

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
if (!checkAuth('PATIENT')) { }
const auth = getAuth();

function statusPill(status) {
  const map = {
    PENDING:   '<i class="fa-solid fa-hourglass-half"></i> Pending',
    REPLIED:   '<i class="fa-solid fa-reply"></i> Replied',
    CONFIRMED: '<i class="fa-solid fa-circle-check"></i> Confirmed',
    COMPLETED: '<i class="fa-solid fa-flag-checkered"></i> Completed',
    REJECTED:  '<i class="fa-solid fa-circle-xmark"></i> Rejected'
  };
  return '<span class="status-pill status-' + status + '">' + (map[status] || status) + '</span>';
}

function stripeClass(status) {
  const map = {
    PENDING: 'stripe-pending',
    REPLIED: 'stripe-replied',
    CONFIRMED: 'stripe-confirmed',
    COMPLETED: 'stripe-completed',
    REJECTED: 'stripe-rejected'
  };
  return map[status] || 'stripe-pending';
}

async function loadAppointments() {
    try {
        const appts = await apiGet('/api/patient/appointments?patientId=' + auth.userId);
        if (appts.length === 0) {
            document.getElementById('apptList').innerHTML =
              '<div class="empty-state"><i class="fa-solid fa-calendar-xmark"></i><p>No appointments yet. Book one from the Doctors page.</p></div>';
            return;
        }

        let html = '';
        appts.forEach(a => {
            html += '<div class="appt-card">'
                + '<div class="appt-stripe ' + stripeClass(a.status) + '"></div>'
                + '<div class="appt-card-inner">'

                + '<div class="d-flex align-items-center gap-3 appt-col" style="flex:1.4;">'
                + '<div class="appt-avatar"><i class="fa-solid fa-user-doctor"></i></div>'
                + '<div>'
                + '<div class="appt-doc-name">' + a.doctorName + '</div>'
                + '<span class="appt-spec-badge">' + a.speciality + '</span>'
                + '</div></div>'

                + '<div class="appt-col">' + statusPill(a.status) + '</div>'

                + '<div class="appt-col">'
                + '<div class="appt-meta">Requested</div>'
                + '<div class="appt-meta"><strong>' + formatDate(a.createdAt) + '</strong></div>'
                + '</div>'

                + '<div class="appt-action-box" id="apptAction' + a.id + '"></div>'
                + '</div></div>';
        });
        document.getElementById('apptList').innerHTML = html;

        // Fill action columns
        appts.forEach(a => {
            const actionDiv = document.getElementById('apptAction' + a.id);
            if (a.status === 'REPLIED') {
                actionDiv.innerHTML =
                    '<div class="appt-detail-line"><i class="fa-solid fa-calendar"></i>' + formatDate(a.scheduledAt) + '</div>'
                    + '<div class="appt-detail-line"><i class="fa-solid fa-rupee-sign"></i>Fee: ₹' + (a.fee || '-') + '</div>'
                    + '<div class="mt-2">'
                    + '<button class="btn-accept me-2" onclick="respondAppt(' + a.id + ', \'accept\')">Accept</button>'
                    + '<button class="btn-reject" onclick="respondAppt(' + a.id + ', \'reject\')">Reject</button>'
                    + '</div>';
            } else if (a.status === 'CONFIRMED') {
                actionDiv.innerHTML = '<div class="appt-detail-line" style="color:#6EE7B7;"><i class="fa-solid fa-calendar-check" style="color:#34D399;"></i>Scheduled: ' + formatDate(a.scheduledAt) + '</div>';
            } else if (a.status === 'COMPLETED') {
                actionDiv.innerHTML = '<span class="status-pill status-COMPLETED"><i class="fa-solid fa-flag-checkered"></i> Visit Completed</span>';
            } else if (a.status === 'PENDING') {
                actionDiv.innerHTML = '<span class="text-muted-soft">Waiting for doctor response…</span>';
            } else if (a.status === 'REJECTED') {
                actionDiv.innerHTML = '<span class="text-muted-soft">Request was rejected.</span>';
            }
        });

    } catch (e) {
        document.getElementById('apptList').innerHTML =
          '<div class="error-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Failed to load appointments.</p></div>';
    }
}

async function respondAppt(id, action) {
    showLoading();
    try {
        await apiPut('/api/patient/appointments/' + id + '/' + action);
        hideLoading();
        showSuccess(action === 'accept' ? 'Appointment confirmed!' : 'Appointment rejected.');
        loadAppointments();
    } catch (e) {
        hideLoading();
        showError('Failed to update appointment.');
    }
}

loadAppointments();
</script>

</body>
</html>
