<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rate Doctor - Vaidyo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<style>
/* ── Dark background (same theme) ── */
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  background: #060D1F;
  background-image:
    radial-gradient(ellipse 700px 500px at 0%   0%,   rgba(6,182,212,.13)  0%, transparent 65%),
    radial-gradient(ellipse 600px 400px at 100% 0%,   rgba(139,92,246,.11) 0%, transparent 60%),
    radial-gradient(ellipse 500px 400px at 0%   100%, rgba(16,185,129,.09) 0%, transparent 60%),
    radial-gradient(ellipse 600px 350px at 100% 80%,  rgba(239,68,68,.07)  0%, transparent 55%);
  color: #E2E8F0;
}
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(6,182,212,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ── Navbar ── */
.navbar-vaidyo {
  background: rgba(6,13,31,.85) !important;
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(6,182,212,.15);
  position: relative; z-index: 10;
}
.navbar-vaidyo .navbar-brand { color:#fff !important; font-weight:700; }

/* ── Page wrap ── */
.page-wrap { position: relative; z-index: 1; }

/* ── Scroll reveal ── */
.reveal { opacity:0; transform:translateY(28px); transition: opacity .55s ease, transform .55s ease; }
.reveal.visible { opacity:1; transform:translateY(0); }
.d1{transition-delay:.08s;} .d2{transition-delay:.16s;} .d3{transition-delay:.24s;}

/* ── Doctor info header card ── */
.doc-header-card {
  background: linear-gradient(135deg, #0C1445 0%, #0E7490 40%, #2563EB 80%, #7C3AED 100%);
  border-radius: 20px;
  padding: 28px 32px;
  color: #fff;
  display: flex; align-items: center; gap: 22px;
  position: relative; overflow: hidden;
  border: 1px solid rgba(255,255,255,.08);
  margin-bottom: 24px;
}
.doc-header-card::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 300px 200px at 90% 50%, rgba(16,185,129,.18) 0%, transparent 65%);
}
.doc-header-card > * { position: relative; z-index: 1; }
.doc-avatar-lg {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; color: #fff; flex-shrink: 0;
  border: 3px solid rgba(255,255,255,.3);
}
.doc-header-card h4 { font-weight:700; margin-bottom:4px; font-size:1.2rem; }
.doc-spec-badge {
  display:inline-block; padding:3px 14px; border-radius:50px;
  background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.3);
  font-size:.72rem; font-weight:700; letter-spacing:.4px; text-transform:uppercase;
  color:#fff;
}

/* ── Rating card ── */
.rating-card {
  background: rgba(13,20,45,.8);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 20px;
  padding: 36px 32px;
  transition: border-color .3s;
}
.rating-card:hover { border-color: rgba(6,182,212,.2); }

.rating-label {
  font-size: 1rem; font-weight: 600; color: #CBD5E1;
  margin-bottom: 24px; text-align: center;
}

/* ── Star selector ── */
.star-selector {
  display: flex; justify-content: center; gap: 10px;
  margin-bottom: 12px;
}
.star-selector i {
  font-size: 2.8rem;
  color: rgba(255,255,255,.15);
  cursor: pointer;
  transition: color .15s ease, transform .15s ease;
}
.star-selector i.active { color: #F59E0B; }
.star-selector i:hover  { transform: scale(1.2); }

.rating-hint {
  text-align: center; font-size: .82rem;
  color: #475569; margin-bottom: 28px; min-height: 20px;
  transition: color .2s;
}

/* ── Review textarea ── */
.review-textarea {
  background: rgba(255,255,255,.05);
  border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 14px;
  color: #E2E8F0; font-size: .9rem;
  padding: 14px 16px; width: 100%; resize: vertical;
  font-family: 'Poppins', sans-serif;
  transition: border-color .2s, box-shadow .2s;
  min-height: 110px;
}
.review-textarea:focus {
  outline: none;
  border-color: #22D3EE;
  box-shadow: 0 0 0 3px rgba(6,182,212,.15);
  background: rgba(255,255,255,.07);
}
.review-textarea::placeholder { color: #334155; }

/* ── Submit button ── */
.btn-submit {
  width: 100%;
  background: linear-gradient(135deg, #0E7490, #2563EB, #7C3AED);
  background-size: 200% 200%;
  animation: grad-shift 4s ease infinite;
  color: #fff; border: none;
  border-radius: 14px; font-weight: 700;
  padding: 14px; font-size: 1rem;
  cursor: pointer; margin-top: 24px;
  transition: transform .25s, box-shadow .25s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(37,99,235,.4);
}
.btn-submit:disabled { opacity:.5; cursor:not-allowed; transform:none; }
@keyframes grad-shift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ── Star rating labels ── */
.star-labels {
  display: flex; justify-content: space-between;
  font-size: .7rem; color: #334155; margin-bottom: 24px;
  padding: 0 4px;
}

/* ── Success state ── */
.success-card {
  background: rgba(5,150,105,.1);
  border: 1px solid rgba(5,150,105,.3);
  border-radius: 20px; padding: 48px 32px;
  text-align: center; display: none;
}
.success-icon {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, #059669, #34D399);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; color: #fff; margin: 0 auto 20px;
  animation: pop-in .4s ease;
}
@keyframes pop-in { 0%{transform:scale(0);} 70%{transform:scale(1.1);} 100%{transform:scale(1);} }
.success-card h4 { font-weight:700; color:#34D399; margin-bottom:8px; }
.success-card p  { color:#64748B; font-size:.9rem; margin-bottom:24px; }

/* ── Back button ── */
.btn-back {
  display: inline-flex; align-items: center; gap: 8px;
  color: rgba(255,255,255,.55); font-size: .85rem; font-weight: 500;
  text-decoration: none; margin-bottom: 20px;
  transition: color .2s;
}
.btn-back:hover { color: #22D3EE; }

/* ── Char counter ── */
.char-counter { font-size:.72rem; color:#334155; text-align:right; margin-top:6px; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-vaidyo">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-heart-pulse"></i> Vaidyo</a>
    <div class="ms-auto d-flex gap-2">
      <a href="dashboard.html" class="btn btn-sm btn-outline-light">Dashboard</a>
      <button class="btn btn-sm btn-light" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="page-wrap">
<div class="container py-4" style="max-width:620px;">

  <!-- Back -->
  <a id="backBtn" href="doctors.html" class="btn-back reveal">
    <i class="fa-solid fa-arrow-left"></i> Back to Profile
  </a>

  <!-- Doctor header -->
  <div class="doc-header-card reveal d1">
    <div class="doc-avatar-lg" id="docAvatar">
      <i class="fa-solid fa-user-doctor"></i>
    </div>
    <div>
      <h4 id="docName">Loading…</h4>
      <span class="doc-spec-badge" id="docSpec">—</span>
    </div>
  </div>

  <!-- Rating form -->
  <div class="rating-card reveal d2" id="ratingCard">

    <div class="rating-label">
      <i class="fa-solid fa-star me-2" style="color:#F59E0B;"></i>
      How was your experience?
    </div>

    <!-- Stars -->
    <div class="star-selector" id="starSelector">
      <i class="fa-regular fa-star" data-index="1"></i>
      <i class="fa-regular fa-star" data-index="2"></i>
      <i class="fa-regular fa-star" data-index="3"></i>
      <i class="fa-regular fa-star" data-index="4"></i>
      <i class="fa-regular fa-star" data-index="5"></i>
    </div>
    <div class="star-labels">
      <span>Poor</span><span>Fair</span><span>Good</span><span>Great</span><span>Excellent</span>
    </div>
    <div class="rating-hint" id="ratingHint">Click a star to rate</div>

    <!-- Review -->
    <label style="font-size:.85rem; font-weight:600; color:#94A3B8; display:block; margin-bottom:8px;">
      <i class="fa-solid fa-pen-to-square me-1" style="color:#22D3EE;"></i>
      Write a review <span style="color:#475569;">(optional)</span>
    </label>
    <textarea class="review-textarea" id="reviewText" maxlength="500"
      placeholder="Share your experience with this doctor…"></textarea>
    <div class="char-counter"><span id="charCount">0</span>/500</div>

    <button class="btn-submit" id="submitBtn" onclick="submitRating()" disabled>
      <i class="fa-solid fa-paper-plane"></i> Submit Rating
    </button>
  </div>

  <!-- Success state -->
  <div class="success-card reveal d3" id="successCard">
    <div class="success-icon"><i class="fa-solid fa-check"></i></div>
    <h4>Thank you for your feedback!</h4>
    <p>Your rating helps other patients find the right doctor.</p>
    <a id="backToProfile" href="doctors.html"
       style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#0E7490,#2563EB);color:#fff;border-radius:12px;padding:12px 28px;font-weight:600;text-decoration:none;">
      <i class="fa-solid fa-arrow-left"></i> Back to Doctor Profile
    </a>
  </div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
if (!checkAuth('PATIENT')) {}
const auth = getAuth();

const params     = new URLSearchParams(window.location.search);
const doctorId   = params.get('doctorId');
const appointmentId = params.get('appointmentId');

if (!doctorId) window.location.href = 'doctors.html';

/* ── Scroll reveal ── */
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

/* ── Load doctor info ── */
async function loadDoctor() {
  try {
    const d = await apiGet(`/api/doctors/${doctorId}`);
    document.getElementById('docName').textContent = 'Dr. ' + (d.fullName || '');
    document.getElementById('docSpec').textContent  = d.speciality || '—';
    document.title = `Rate Dr. ${d.fullName} - Vaidyo`;
    document.getElementById('backBtn').href = `doctor-profile.html?id=${doctorId}`;
    document.getElementById('backToProfile').href = `doctor-profile.html?id=${doctorId}`;
    if (d.profilePhoto) {
      document.getElementById('docAvatar').innerHTML =
        `<img src="${d.profilePhoto}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    }
  } catch { /* show fallback */ }
}

/* ── Star interaction ── */
let selectedRating = 0;
const hints = ['', 'Poor experience', 'Fair experience', 'Good experience', 'Great experience', 'Excellent experience!'];
const stars  = document.querySelectorAll('#starSelector i');

stars.forEach(star => {
  star.addEventListener('click', () => {
    selectedRating = parseInt(star.dataset.index);
    updateStars(selectedRating);
    document.getElementById('ratingHint').textContent = hints[selectedRating];
    document.getElementById('ratingHint').style.color = selectedRating >= 4 ? '#34D399' : selectedRating === 3 ? '#F59E0B' : '#F87171';
    document.getElementById('submitBtn').disabled = false;
  });
  star.addEventListener('mouseenter', () => updateStars(parseInt(star.dataset.index)));
  star.addEventListener('mouseleave', () => updateStars(selectedRating));
});

function updateStars(count) {
  stars.forEach((s, i) => {
    if (i < count) {
      s.className = 'fa-solid fa-star active';
    } else {
      s.className = 'fa-regular fa-star';
    }
  });
}

/* ── Char counter ── */
document.getElementById('reviewText').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length;
});

/* ── Submit ── */
async function submitRating() {
  if (!selectedRating) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting…';

  const payload = {
    doctorId:      parseInt(doctorId),
    appointmentId: appointmentId ? parseInt(appointmentId) : null,
    rating:        selectedRating,
    comment:       document.getElementById('reviewText').value.trim()
  };

  try {
    await apiPost('/api/ratings', payload);
    // show success
    document.getElementById('ratingCard').style.display   = 'none';
    document.getElementById('successCard').style.display  = 'block';
    document.getElementById('successCard').classList.add('visible');
  } catch {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit Rating';
    showError('Failed to submit rating. Please try again.');
  }
}

loadDoctor();
</script>
</body>
</html>
