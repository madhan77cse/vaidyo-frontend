<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicines - Vaidyo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-vaidyo">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-heart-pulse"></i> Vaidyo</a>
    <div class="ms-auto d-flex gap-2">
      <a href="dashboard.html" class="btn btn-sm btn-outline-light">Dashboard</a>
      <a href="health.html" class="btn btn-sm btn-outline-light">Health</a>
      <a href="doctors.html" class="btn btn-sm btn-outline-light">Doctors</a>
      <a href="appointments.html" class="btn btn-sm btn-outline-light">Appointments</a>
      <button class="btn btn-sm btn-light" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container my-4">

  <!-- Add Medicine -->
  <div class="card-custom mb-4">
    <h5><i class="fa-solid fa-pills"></i> Add Medicine</h5>
    <form id="medForm" class="row g-3 mt-2">
      <div class="col-md-3">
        <label class="form-label">Medicine Name</label>
        <input type="text" class="form-control" id="medicineName" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Dosage</label>
        <input type="text" class="form-control" id="dosage" placeholder="e.g. 1 tablet" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Frequency</label>
        <input type="text" class="form-control" id="frequency" placeholder="e.g. Twice daily" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Reminder Time</label>
        <input type="time" class="form-control" id="reminderTime" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Notes</label>
        <input type="text" class="form-control" id="notes">
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Add Medicine</button>
      </div>
    </form>
  </div>

  <!-- Active Medicines -->
  <div class="card-custom mb-4">
    <h5><i class="fa-solid fa-list"></i> Active Medicines</h5>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr><th>Name</th><th>Dosage</th><th>Frequency</th><th>Reminder</th><th>Actions</th></tr>
        </thead>
        <tbody id="medTableBody">
          <tr><td colspan="5" class="text-muted text-center">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Medicine Log -->
  <div class="card-custom mb-4">
    <h5><i class="fa-solid fa-clock-rotate-left"></i> Medicine Log History</h5>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr><th>Medicine</th><th>Status</th><th>Time</th></tr>
        </thead>
        <tbody id="logTableBody">
          <tr><td colspan="3" class="text-muted text-center">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Telegram -->
  <div class="card-custom">
    <h5><i class="fa-brands fa-telegram"></i> Telegram Reminders</h5>
    <div id="telegramSection">
      <p class="text-muted small">Loading...</p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
if (!checkAuth('PATIENT')) { }
const auth = getAuth();

function convertTo12Hr(time) {
    if (!time) return '-';
    const [h, m] = time.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hour = h % 12 || 12;
    return hour + ':' + String(m).padStart(2, '0') + ' ' + ampm;
}

function getLogBadge(status) {
    if (status === 'TAKEN') return '<span class="badge bg-success">TAKEN</span>';
    if (status === 'MISSED') return '<span class="badge bg-danger">MISSED</span>';
    return '<span class="badge bg-warning text-dark">PENDING</span>';
}

async function loadMedicines() {
    try {
        const meds = await apiGet('/api/patient/medicines?patientId=' + auth.userId);
        if (meds.length === 0) {
            document.getElementById('medTableBody').innerHTML =
                '<tr><td colspan="5" class="text-muted text-center">No medicines added yet.</td></tr>';
        } else {
            let html = '';
            meds.forEach(m => {
                html += '<tr>'
                    + '<td><strong>' + m.medicineName + '</strong></td>'
                    + '<td>' + m.dosage + '</td>'
                    + '<td>' + m.frequency + '</td>'
                    + '<td>' + convertTo12Hr(m.reminderTime) + '</td>'
                    + '<td>'
                    + '<button class="btn btn-sm btn-success me-1" onclick="markTaken(' + m.id + ')">Taken</button>'
                    + '<button class="btn btn-sm btn-danger" onclick="deleteMed(' + m.id + ')">Delete</button>'
                    + '</td>'
                    + '</tr>';
            });
            document.getElementById('medTableBody').innerHTML = html;
        }
    } catch (e) {
        document.getElementById('medTableBody').innerHTML =
            '<tr><td colspan="5" class="text-danger text-center">Failed to load medicines.</td></tr>';
    }
}

async function loadLogs() {
    try {
        const logs = await apiGet('/api/patient/medicines/logs?patientId=' + auth.userId);
        if (logs.length === 0) {
            document.getElementById('logTableBody').innerHTML =
                '<tr><td colspan="3" class="text-muted text-center">No logs yet.</td></tr>';
        } else {
            let html = '';
            logs.forEach(l => {
                html += '<tr>'
                    + '<td>' + (l.medicine ? l.medicine.medicineName : '-') + '</td>'
                    + '<td>' + getLogBadge(l.status) + '</td>'
                    + '<td>' + formatDate(l.takenAt || l.scheduledTime || l.createdAt) + '</td>'
                    + '</tr>';
            });
            document.getElementById('logTableBody').innerHTML = html;
        }
    } catch (e) {
        document.getElementById('logTableBody').innerHTML =
            '<tr><td colspan="3" class="text-danger text-center">Failed to load logs.</td></tr>';
    }
}

document.getElementById('medForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const payload = {
        medicineName: document.getElementById('medicineName').value,
        dosage: document.getElementById('dosage').value,
        frequency: document.getElementById('frequency').value,
        reminderTime: document.getElementById('reminderTime').value,
        notes: document.getElementById('notes').value
    };
    showLoading();
    try {
        await apiPost('/api/patient/medicines?patientId=' + auth.userId, payload);
        hideLoading();
        showSuccess('Medicine added!');
        document.getElementById('medForm').reset();
        loadMedicines();
    } catch (err) {
        hideLoading();
        showError('Failed to add medicine.');
    }
});

async function markTaken(id) {
    try {
        await apiPost('/api/patient/medicines/' + id + '/taken?patientId=' + auth.userId, {});
        showSuccess('Marked as taken!');
        loadMedicines();
        loadLogs();
    } catch (e) {
        showError('Failed to update.');
    }
}

async function deleteMed(id) {
    const result = await Swal.fire({
        title: 'Delete this medicine?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Yes, delete',
        confirmButtonColor: '#F44336'
    });
    if (result.isConfirmed) {
        try {
            await apiDelete('/api/patient/medicines/' + id);
            showSuccess('Medicine removed!');
            loadMedicines();
        } catch (e) {
            showError('Failed to delete.');
        }
    }
}

async function loadTelegram() {
    try {
        const status = await apiGet('/api/telegram/status/' + auth.userId);
        if (status.linked) {
            document.getElementById('telegramSection').innerHTML =
                '<p class="text-success mb-0"><i class="fa-solid fa-circle-check"></i> Telegram Connected</p>';
        } else {
            document.getElementById('telegramSection').innerHTML =
                '<p class="text-muted small">Link Telegram to receive medicine reminders.</p>'
                + '<button class="btn btn-primary btn-sm" onclick="linkTelegram()">Generate Link Code</button>'
                + '<div id="telegramCode" class="mt-2"></div>';
        }
    } catch (e) {
        document.getElementById('telegramSection').innerHTML =
            '<p class="text-muted small">Unable to check Telegram status.</p>';
    }
}

async function linkTelegram() {
    try {
        const data = await apiGet('/api/telegram/generate/' + auth.userId);
        document.getElementById('telegramCode').innerHTML =
            '<div class="alert alert-info small mb-0">'
            + 'Open <strong>@' + data.botUsername + '</strong> on Telegram and send code: <strong>' + data.code + '</strong>'
            + '</div>';
    } catch (e) {
        showError('Failed to generate code.');
    }
}

loadMedicines();
loadLogs();
loadTelegram();
</script>

</body>
</html>
