<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Vaidyo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
.auth-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0F172A, #1E3A8A, #2563EB);
    padding: 20px;
}
.auth-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    padding: 40px;
    width: 100%;
    max-width: 480px;
}
.auth-card .logo {
    text-align: center;
    margin-bottom: 25px;
}
.auth-card .logo i {
    font-size: 2.5rem;
    color: var(--primary);
}
.auth-card .logo h3 {
    font-weight: 700;
    margin-top: 10px;
    color: var(--dark);
}
.role-card {
    border: 2px solid #E2E8F0;
    border-radius: 12px;
    padding: 20px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
}
.role-card:hover {
    border-color: var(--primary);
}
.role-card.selected {
    border-color: var(--primary);
    background: #EFF6FF;
}
.role-card i {
    font-size: 1.8rem;
    color: var(--primary);
    margin-bottom: 8px;
    display: block;
}
</style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo">
      <i class="fa-solid fa-heart-pulse"></i>
      <h3>Vaidyo</h3>
      <p class="text-muted small">Create your account</p>
    </div>

    <!-- Step 1: Role selection -->
    <div id="step1">
      <p class="mb-3 fw-500">I am registering as a:</p>
      <div class="row g-2 mb-3">
        <div class="col-4">
          <div class="role-card" data-role="PATIENT" onclick="selectRole('PATIENT')">
            <i class="fa-solid fa-user"></i>
            <div class="small fw-500">Patient</div>
          </div>
        </div>
        <div class="col-4">
          <div class="role-card" data-role="DOCTOR" onclick="selectRole('DOCTOR')">
            <i class="fa-solid fa-user-doctor"></i>
            <div class="small fw-500">Doctor</div>
          </div>
        </div>
        <div class="col-4">
          <div class="role-card" data-role="CARETAKER" onclick="selectRole('CARETAKER')">
            <i class="fa-solid fa-user-nurse"></i>
            <div class="small fw-500">Caretaker</div>
          </div>
        </div>
      </div>
      <button class="btn btn-primary w-100" onclick="goToStep2()" id="continueBtn" disabled>Continue</button>
    </div>

    <!-- Step 2: Form -->
    <div id="step2" style="display:none;">
      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullName" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Mobile Number</label>
          <input type="tel" class="form-control" id="mobileNumber" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required>
        </div>

        <!-- PATIENT FIELDS -->
        <div id="patientFields" style="display:none;">
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label">Age</label>
              <input type="number" class="form-control" id="age">
            </div>
            <div class="col-6 mb-3">
              <label class="form-label">Blood Group</label>
              <select class="form-select" id="bloodGroup">
                <option value="">Select</option>
                <option>A+</option><option>A-</option>
                <option>B+</option><option>B-</option>
                <option>O+</option><option>O-</option>
                <option>AB+</option><option>AB-</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea class="form-control" id="address" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Emergency Contact</label>
            <input type="tel" class="form-control" id="emergencyContact">
          </div>
        </div>

        <!-- DOCTOR FIELDS -->
        <div id="doctorFields" style="display:none;">
          <div class="mb-3">
            <label class="form-label">License Number</label>
            <input type="text" class="form-control" id="licenseNumber">
          </div>
          <div class="mb-3">
            <label class="form-label">Speciality</label>
            <select class="form-select" id="speciality">
              <option value="">Select</option>
              <option value="GENERAL">General</option>
              <option value="CARDIOLOGY">Cardiology</option>
              <option value="ORTHOPEDICS">Orthopedics</option>
              <option value="DIABETOLOGY">Diabetology</option>
              <option value="NEUROLOGY">Neurology</option>
              <option value="DERMATOLOGY">Dermatology</option>
              <option value="ENT">ENT</option>
              <option value="OPHTHALMOLOGY">Ophthalmology</option>
              <option value="GYNECOLOGY">Gynecology</option>
              <option value="PEDIATRICS">Pediatrics</option>
              <option value="PSYCHIATRY">Psychiatry</option>
              <option value="UROLOGY">Urology</option>
            </select>
          </div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label">Experience (Years)</label>
              <input type="number" class="form-control" id="experienceYears">
            </div>
            <div class="col-6 mb-3">
              <label class="form-label">Consultation Fee</label>
              <input type="number" class="form-control" id="consultationFee">
            </div>
          </div>
        </div>

        <!-- CARETAKER FIELDS -->
        <div id="caretakerFields" style="display:none;">
          <div class="mb-3">
            <label class="form-label">Patient's Mobile Number</label>
            <input type="tel" class="form-control" id="patientMobileNumber">
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Register</button>
        <button type="button" class="btn btn-outline-secondary w-100 mt-2" onclick="goToStep1()">Back</button>
      </form>
    </div>

    <p class="text-center mt-3 small">Already have an account? <a href="login.html">Login</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
let selectedRole = '';

function selectRole(role) {
    selectedRole = role;
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
    document.querySelector('.role-card[data-role="' + role + '"]').classList.add('selected');
    document.getElementById('continueBtn').disabled = false;
}

function goToStep2() {
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';

    document.getElementById('patientFields').style.display = 'none';
    document.getElementById('doctorFields').style.display = 'none';
    document.getElementById('caretakerFields').style.display = 'none';

    if (selectedRole === 'PATIENT') document.getElementById('patientFields').style.display = 'block';
    if (selectedRole === 'DOCTOR') document.getElementById('doctorFields').style.display = 'block';
    if (selectedRole === 'CARETAKER') document.getElementById('caretakerFields').style.display = 'block';
}

function goToStep1() {
    document.getElementById('step1').style.display = 'block';
    document.getElementById('step2').style.display = 'none';
}

document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const payload = {
        fullName: document.getElementById('fullName').value,
        mobileNumber: document.getElementById('mobileNumber').value,
        password: document.getElementById('password').value,
        role: selectedRole
    };

    if (selectedRole === 'PATIENT') {
        payload.age = parseInt(document.getElementById('age').value) || null;
        payload.bloodGroup = document.getElementById('bloodGroup').value;
        payload.address = document.getElementById('address').value;
        payload.emergencyContact = document.getElementById('emergencyContact').value;
    } else if (selectedRole === 'DOCTOR') {
        payload.licenseNumber = document.getElementById('licenseNumber').value;
        payload.speciality = document.getElementById('speciality').value;
        payload.experienceYears = parseInt(document.getElementById('experienceYears').value) || null;
        payload.consultationFee = parseFloat(document.getElementById('consultationFee').value) || null;
    } else if (selectedRole === 'CARETAKER') {
        payload.patientMobileNumber = document.getElementById('patientMobileNumber').value;
    }

    showLoading();

    try {
        const data = await apiPost('/api/auth/register', payload, false);
        hideLoading();

        if (data.token) {
            saveAuth(data);
            showSuccess('Registration successful!');
            setTimeout(() => redirectByRole(data.role), 1200);
        } else {
            showError(data.message || 'Registration failed. Please check your details.');
        }
    } catch (err) {
        hideLoading();
        showError('Unable to connect to server. Please try again.');
    }
});
</script>

</body>
</html>
