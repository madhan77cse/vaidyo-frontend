<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caretaker Dashboard - Vaidyo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<style>

/* BACKGROUND */
body {
  min-height: 100vh;
  background: #060D1F;
  background-image:
    radial-gradient(ellipse 520px 380px at -5% 0%,   rgba(6,182,212,.13)  0%, transparent 65%),
    radial-gradient(ellipse 480px 320px at 105% 5%,  rgba(239,68,68,.10)  0%, transparent 60%),
    radial-gradient(ellipse 400px 350px at 0%  55%,  rgba(16,185,129,.09) 0%, transparent 60%),
    radial-gradient(ellipse 450px 300px at 100% 50%, rgba(139,92,246,.09) 0%, transparent 55%),
    radial-gradient(ellipse 700px 350px at 50% 110%, rgba(59,130,246,.08) 0%, transparent 60%);
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(6,182,212,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,.04) 1px, transparent 1px),
    linear-gradient(rgba(6,182,212,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,.02) 1px, transparent 1px);
  background-size: 80px 80px, 80px 80px, 20px 20px, 20px 20px;
}
nav, .page-header, .container { position: relative; z-index: 1; }

/* NAVBAR */
.navbar-vaidyo {
  background: linear-gradient(135deg, #0F172A, #0E7490, #2563EB) !important;
}

/* PAGE HEADER */
.page-header {
  background: linear-gradient(135deg, #0F172A 0%, #0E7490 45%, #2563EB 100%);
  padding: 36px 0 30px;
  position: relative; overflow: hidden;
}
.page-header::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 400px 200px at 80% 50%, rgba(16,185,129,.18) 0%, transparent 65%),
    radial-gradient(ellipse 300px 200px at 10% 80%, rgba(239,68,68,.12) 0%, transparent 60%);
}
.page-header > .container { position: relative; z-index: 1; }
.page-header h2 { font-weight: 800; font-size: 1.9rem; color: #fff; margin-bottom: 4px; }
.page-header p  { color: rgba(255,255,255,.65); margin: 0; font-size: .92rem; }

/* GLASS CARD */
.glass-card {
  background: rgba(255,255,255,.05);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
  height: 100%;
}
.glass-card h5 {
  font-weight: 700; font-size: .95rem;
  color: #E2E8F0; margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
}
.glass-card h5 i { color: #22D3EE; font-size: 1rem; }

/* ALERT BANNERS */
.alert-critical {
  background: rgba(220,38,38,.15);
  border: 1px solid rgba(220,38,38,.4);
  border-radius: 14px; color: #FCA5A5;
  padding: 14px 20px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 12px;
  font-weight: 600; font-size: .9rem;
}
.alert-warning-custom {
  background: rgba(217,119,6,.15);
  border: 1px solid rgba(217,119,6,.4);
  border-radius: 14px; color: #FDE68A;
  padding: 14px 20px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 12px;
  font-weight: 600; font-size: .9rem;
}

/* VITALS GRID */
.vital-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 14px;
}
.vital-item {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 14px;
  padding: 14px 10px;
  text-align: center;
  transition: border-color .2s;
}
.vital-item:hover { border-color: rgba(6,182,212,.25); }
.vital-item .v-icon { font-size: .9rem; margin-bottom: 5px; display: block; }
.vital-item .v-label { font-size: .68rem; color: rgba(255,255,255,.38); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 5px; }
.vital-item .v-value { font-size: 1.05rem; font-weight: 700; color: #F1F5F9; display: block; line-height: 1.2; }
.vital-item .v-unit  { font-size: .65rem; color: rgba(255,255,255,.3); display: block; margin-top: 2px; }

/* STATUS BADGES */
.badge-normal   { background: rgba(16,185,129,.2);  color: #6EE7B7; border: 1px solid rgba(16,185,129,.4); border-radius: 50px; padding: 3px 10px; font-size: .7rem; font-weight: 700; }
.badge-warning  { background: rgba(217,119,6,.2);   color: #FDE68A; border: 1px solid rgba(217,119,6,.4);  border-radius: 50px; padding: 3px 10px; font-size: .7rem; font-weight: 700; }
.badge-critical { background: rgba(220,38,38,.2);   color: #FCA5A5; border: 1px solid rgba(220,38,38,.4);  border-radius: 50px; padding: 3px 10px; font-size: .7rem; font-weight: 700; }

.logged-at {
  font-size: .78rem; color: rgba(255,255,255,.3);
  display: flex; align-items: center; gap: 6px; margin-top: 4px;
}
.logged-at i { color: #22D3EE; }

/* MEDICINE INFO BOX */
.med-info-box {
  background: rgba(99,102,241,.1);
  border: 1px solid rgba(99,102,241,.25);
  border-radius: 12px; padding: 16px;
  display: flex; align-items: flex-start; gap: 12px;
}
.med-info-box i { color: #A5B4FC; font-size: 1.2rem; margin-top: 2px; flex-shrink: 0; }
.med-info-box p { color: rgba(255,255,255,.5); font-size: .85rem; margin: 0; line-height: 1.6; }

/* TELEGRAM */
.tg-connected {
  display: flex; align-items: center; gap: 14px;
  background: rgba(16,185,129,.1);
  border: 1px solid rgba(16,185,129,.3);
  border-radius: 12px; padding: 14px 16px;
}
.tg-connected i { color: #34D399; font-size: 1.4rem; }
.tg-connected .tg-title { color: #6EE7B7; font-weight: 600; font-size: .9rem; }
.tg-connected .tg-sub   { color: rgba(255,255,255,.4); font-size: .78rem; margin: 2px 0 0; }

.btn-tg {
  background: linear-gradient(135deg, #2563EB, #7C3AED);
  color: #fff; border: none; border-radius: 11px;
  font-weight: 600; padding: 10px 20px; font-size: .88rem;
  cursor: pointer; transition: all .25s ease;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-tg:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(124,58,237,.4); color: #fff; }

.tg-code-box {
  background: rgba(6,182,212,.08);
  border: 1px solid rgba(6,182,212,.25);
  border-radius: 12px; padding: 16px; margin-top: 14px;
}
.tg-code-box p { color: rgba(255,255,255,.55); font-size: .84rem; margin: 0 0 10px; }
.tg-code-box .code-chip {
  background: rgba(6,182,212,.2); color: #67E8F9;
  border: 1px solid rgba(6,182,212,.4);
  border-radius: 8px; padding: 7px 18px;
  font-size: 1.15rem; font-weight: 700; letter-spacing: 3px;
  display: inline-block;
}

/* SKELETON */
.skeleton-line {
  height: 13px; border-radius: 6px;
  background: linear-gradient(90deg, rgba(255,255,255,.05) 25%, rgba(255,255,255,.1) 50%, rgba(255,255,255,.05) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  margin-bottom: 10px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-vaidyo">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-heart-pulse"></i> Vaidyo</a>
    <div class="ms-auto d-flex gap-2">
      <a href="patient.html" class="btn btn-sm btn-outline-light">
        <i class="fa-solid fa-clock-rotate-left me-1"></i>Full History
      </a>
      <button class="btn btn-sm btn-light" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<!-- Page Header -->
<div class="page-header">
  <div class="container">
    <h2>
      <i class="fa-solid fa-shield-heart me-2" style="color:#60A5FA;"></i>
      <span id="welcomeMsg">Welcome!</span>
    </h2>
    <p>Monitoring your patient's health and medicine status in real time.</p>
  </div>
</div>

<div class="container py-4">

  <!-- Alert Banner -->
  <div id="alertBanner"></div>

  <div class="row g-4">

    <!-- Health Readings -->
    <div class="col-lg-6">
      <div class="glass-card">
        <h5><i class="fa-solid fa-heart-pulse"></i> Latest Health Readings</h5>
        <div id="healthLatest">
          <div class="skeleton-line" style="width:60%"></div>
          <div class="skeleton-line" style="width:80%"></div>
          <div class="skeleton-line" style="width:50%"></div>
        </div>
      </div>
    </div>

    <!-- Medicine Status -->
    <div class="col-lg-6">
      <div class="glass-card">
        <h5><i class="fa-solid fa-pills"></i> Medicine Status</h5>
        <div id="medStatus">
          <div class="skeleton-line" style="width:70%"></div>
          <div class="skeleton-line" style="width:55%"></div>
        </div>
      </div>
    </div>

    <!-- Telegram Alerts -->
    <div class="col-lg-6">
      <div class="glass-card">
        <h5><i class="fa-brands fa-telegram"></i> Telegram Alerts</h5>
        <div id="telegramSection">
          <div class="skeleton-line" style="width:65%"></div>
          <div class="skeleton-line" style="width:40%"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
if (!checkAuth('CARETAKER')) { }
const auth = getAuth();
document.getElementById('welcomeMsg').textContent = 'Welcome, ' + auth.fullName + '!';

const patientId = localStorage.getItem('patientId');

function getStatusBadge(status) {
  if (status === 'CRITICAL') return '<span class="badge-critical"><i class="fa-solid fa-circle-exclamation me-1"></i>Critical</span>';
  if (status === 'WARNING')  return '<span class="badge-warning"><i class="fa-solid fa-triangle-exclamation me-1"></i>Warning</span>';
  return '<span class="badge-normal"><i class="fa-solid fa-circle-check me-1"></i>Normal</span>';
}

function formatDate(dt) {
  if (!dt) return '';
  return new Date(dt).toLocaleString('en-IN', {
    day: 'numeric', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

async function loadDashboard() {
  if (!patientId) {
    document.getElementById('healthLatest').innerHTML = '<p style="color:#FCA5A5;font-size:.85rem;margin:0;">Patient ID not found. Please contact support.</p>';
    document.getElementById('medStatus').innerHTML    = '<p style="color:#FCA5A5;font-size:.85rem;margin:0;">Patient ID not found.</p>';
    return;
  }

  try {
    const logs = await apiGet('/api/caretaker/patients/' + patientId + '/health');

    if (!logs || logs.length === 0) {
      document.getElementById('healthLatest').innerHTML = '<p style="color:rgba(255,255,255,.4);font-size:.85rem;margin:0;">No health logs yet.</p>';
      document.getElementById('medStatus').innerHTML    = '<p style="color:rgba(255,255,255,.4);font-size:.85rem;margin:0;">No medicine data available.</p>';
      return;
    }

    const l = logs[0];

    // Alert banner
    if (l.alertStatus === 'CRITICAL') {
      document.getElementById('alertBanner').innerHTML =
        '<div class="alert-critical">'
        + '<i class="fa-solid fa-triangle-exclamation fa-lg"></i>'
        + '<span>CRITICAL health reading detected! Immediate attention may be required.</span>'
        + '</div>';
    } else if (l.alertStatus === 'WARNING') {
      document.getElementById('alertBanner').innerHTML =
        '<div class="alert-warning-custom">'
        + '<i class="fa-solid fa-triangle-exclamation fa-lg"></i>'
        + '<span>WARNING level health reading detected. Please check on your patient.</span>'
        + '</div>';
    }

    // Vitals grid
    document.getElementById('healthLatest').innerHTML =
      '<div class="vital-grid">'
      + '<div class="vital-item"><i class="fa-solid fa-heart v-icon" style="color:#F87171;"></i><span class="v-label">Blood Pressure</span><span class="v-value">' + l.bpSystolic + '/' + l.bpDiastolic + '</span><span class="v-unit">mmHg</span></div>'
      + '<div class="vital-item"><i class="fa-solid fa-droplet v-icon" style="color:#FCD34D;"></i><span class="v-label">Sugar</span><span class="v-value">' + l.sugarLevel + '</span><span class="v-unit">mg/dL</span></div>'
      + '<div class="vital-item"><i class="fa-solid fa-weight-scale v-icon" style="color:#67E8F9;"></i><span class="v-label">Weight</span><span class="v-value">' + l.weight + '</span><span class="v-unit">kg</span></div>'
      + '<div class="vital-item"><i class="fa-solid fa-wave-square v-icon" style="color:#A78BFA;"></i><span class="v-label">Pulse</span><span class="v-value">' + l.pulseRate + '</span><span class="v-unit">bpm</span></div>'
      + '<div class="vital-item"><i class="fa-solid fa-thermometer-half v-icon" style="color:#FB923C;"></i><span class="v-label">Temperature</span><span class="v-value">' + l.temperature + '</span><span class="v-unit">F</span></div>'
      + '<div class="vital-item"><i class="fa-solid fa-shield-heart v-icon" style="color:#34D399;"></i><span class="v-label">Status</span><span class="v-value" style="font-size:.82rem;">' + getStatusBadge(l.alertStatus) + '</span></div>'
      + '</div>'
      + '<div class="logged-at"><i class="fa-solid fa-clock"></i> Last logged: ' + formatDate(l.loggedAt) + '</div>';

    // Medicine status
    document.getElementById('medStatus').innerHTML =
      '<div class="med-info-box">'
      + '<i class="fa-solid fa-circle-info"></i>'
      + '<p>Medicine dose tracking for caretakers is coming soon. A dedicated endpoint will show dose completion and missed medicines here in real time.</p>'
      + '</div>';

  } catch (e) {
    document.getElementById('healthLatest').innerHTML = '<p style="color:#FCA5A5;font-size:.85rem;margin:0;">Failed to load health data.</p>';
    document.getElementById('medStatus').innerHTML    = '<p style="color:#FCA5A5;font-size:.85rem;margin:0;">Failed to load data.</p>';
  }
}

async function loadTelegram() {
  try {
    const status = await apiGet('/api/telegram/status/' + auth.userId);
    if (status.linked) {
      document.getElementById('telegramSection').innerHTML =
        '<div class="tg-connected">'
        + '<i class="fa-brands fa-telegram fa-lg"></i>'
        + '<div><div class="tg-title">Telegram Connected</div>'
        + '<div class="tg-sub">You will receive real-time health alerts for your patient.</div></div>'
        + '</div>';
    } else {
      document.getElementById('telegramSection').innerHTML =
        '<p style="color:rgba(255,255,255,.5);font-size:.85rem;margin-bottom:14px;">Link your Telegram to receive instant health alerts for your patient.</p>'
        + '<button class="btn-tg" onclick="linkTelegram()"><i class="fa-brands fa-telegram"></i> Generate Link Code</button>'
        + '<div id="telegramCode"></div>';
    }
  } catch (e) {
    document.getElementById('telegramSection').innerHTML =
      '<p style="color:rgba(255,255,255,.4);font-size:.85rem;margin:0;">Unable to check Telegram status.</p>';
  }
}

async function linkTelegram() {
  try {
    const data = await apiGet('/api/telegram/generate/' + auth.userId);
    document.getElementById('telegramCode').innerHTML =
      '<div class="tg-code-box">'
      + '<p>Open <strong style="color:#67E8F9;">@' + data.botUsername + '</strong> on Telegram and send this code:</p>'
      + '<span class="code-chip">' + data.code + '</span>'
      + '</div>';
  } catch (e) {
    showError('Failed to generate code.');
  }
}

loadDashboard();
loadTelegram();
</script>
</body>
</html>
