<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient History - Vaidyo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-vaidyo">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-heart-pulse"></i> Vaidyo</a>
    <div class="ms-auto d-flex gap-2">
      <a href="dashboard.html" class="btn btn-sm btn-outline-light">Dashboard</a>
      <button class="btn btn-sm btn-light" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container my-4">

  <!-- Compliance -->
  <div class="card-custom mb-4">
    <h5><i class="fa-solid fa-chart-pie"></i> Medicine Compliance</h5>
    <div id="complianceSection" class="mt-2">
      <p class="text-muted small">Loading...</p>
    </div>
  </div>

  <!-- Charts -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card-custom">
        <h6>BP Trend</h6>
        <canvas id="bpChart"></canvas>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card-custom">
        <h6>Sugar Trend</h6>
        <canvas id="sugarChart"></canvas>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card-custom">
        <h6>Weight Trend</h6>
        <canvas id="weightChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Full History -->
  <div class="card-custom">
    <h5><i class="fa-solid fa-clock-rotate-left"></i> Full Health History</h5>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr><th>Date</th><th>BP</th><th>Sugar</th><th>Weight</th><th>Pulse</th><th>Temp</th><th>Status</th><th>Notes</th></tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="8" class="text-muted text-center">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
if (!checkAuth('CARETAKER')) { }
const auth = getAuth();
const patientId = localStorage.getItem('patientId');

async function loadHistory() {
    if (!patientId) {
        document.getElementById('historyBody').innerHTML = '<tr><td colspan="8" class="text-danger text-center">Patient ID not found.</td></tr>';
        document.getElementById('complianceSection').innerHTML = '<p class="text-danger small">Patient ID not found.</p>';
        return;
    }

    try {
        const logs = await apiGet('/api/caretaker/patients/' + patientId + '/health');

        if (logs.length === 0) {
            document.getElementById('historyBody').innerHTML = '<tr><td colspan="8" class="text-muted text-center">No health logs yet.</td></tr>';
            document.getElementById('complianceSection').innerHTML = '<p class="text-muted small">No data available.</p>';
            return;
        }

        // History table
        let html = '';
        logs.forEach(l => {
            html += '<tr>'
                + '<td>' + formatDate(l.loggedAt) + '</td>'
                + '<td>' + l.bpSystolic + '/' + l.bpDiastolic + '</td>'
                + '<td>' + l.sugarLevel + '</td>'
                + '<td>' + l.weight + '</td>'
                + '<td>' + l.pulseRate + '</td>'
                + '<td>' + l.temperature + '</td>'
                + '<td>' + getStatusBadge(l.alertStatus) + '</td>'
                + '<td>' + (l.notes || '-') + '</td>'
                + '</tr>';
        });
        document.getElementById('historyBody').innerHTML = html;

        // Compliance summary based on alert statuses
        const total = logs.length;
        const normal = logs.filter(l => l.alertStatus === 'NORMAL').length;
        const percent = total > 0 ? Math.round((normal / total) * 100) : 0;

        document.getElementById('complianceSection').innerHTML =
            '<div class="d-flex align-items-center gap-3">'
            + '<div class="flex-grow-1">'
            + '<div class="progress" style="height: 20px;">'
            + '<div class="progress-bar bg-success" style="width: ' + percent + '%">' + percent + '%</div>'
            + '</div>'
            + '</div>'
            + '<div><strong>' + normal + '/' + total + '</strong> readings normal</div>'
            + '</div>'
            + '<p class="text-muted small mt-2 mb-0">Based on health log alert statuses. Medicine-specific compliance requires a dedicated caretaker endpoint.</p>';

        // Charts
        const recent = logs.slice(0, 7).reverse();
        const labels = recent.map(l => formatDate(l.loggedAt));

        new Chart(document.getElementById('bpChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Systolic', data: recent.map(l => l.bpSystolic), borderColor: '#2196F3', tension: 0.3 },
                    { label: 'Diastolic', data: recent.map(l => l.bpDiastolic), borderColor: '#F44336', tension: 0.3 }
                ]
            },
            options: { responsive: true }
        });

        new Chart(document.getElementById('sugarChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ label: 'Sugar', data: recent.map(l => l.sugarLevel), borderColor: '#FF9800', tension: 0.3 }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        new Chart(document.getElementById('weightChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ label: 'Weight', data: recent.map(l => l.weight), borderColor: '#4CAF50', tension: 0.3 }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

    } catch (e) {
        document.getElementById('historyBody').innerHTML = '<tr><td colspan="8" class="text-danger text-center">Failed to load data.</td></tr>';
        document.getElementById('complianceSection').innerHTML = '<p class="text-danger small">Failed to load data.</p>';
    }
}

loadHistory();
</script>

</body>
</html>
