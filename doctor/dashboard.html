<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Dashboard - Vaidyo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-vaidyo">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-heart-pulse"></i> Vaidyo</a>
    <div class="ms-auto d-flex gap-2">
      <a href="appointments.html" class="btn btn-sm btn-outline-light">Appointments</a>
      <a href="availability.html" class="btn btn-sm btn-outline-light">Availability</a>
      <button class="btn btn-sm btn-light" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container my-4">

  <div class="card-custom mb-4">
    <h3 id="welcomeMsg">Good Morning, Dr.!</h3>
    <p class="text-muted mb-0">Here's your activity summary.</p>
  </div>

  <!-- Stats -->
  <div class="row g-3 mb-4">
    <div class="col-md-4 col-6">
      <div class="card-custom text-center">
        <i class="fa-solid fa-clock text-warning fs-3 mb-2"></i>
        <h4 id="pendingCount">0</h4>
        <p class="text-muted small mb-0">Pending Requests</p>
      </div>
    </div>
    <div class="col-md-4 col-6">
      <div class="card-custom text-center">
        <i class="fa-solid fa-calendar-day text-info fs-3 mb-2"></i>
        <h4 id="todayCount">0</h4>
        <p class="text-muted small mb-0">Today's Appointments</p>
      </div>
    </div>
    <div class="col-md-4 col-6">
      <div class="card-custom text-center">
        <i class="fa-solid fa-circle-check text-success fs-3 mb-2"></i>
        <h4 id="completedCount">0</h4>
        <p class="text-muted small mb-0">Total Completed</p>
      </div>
    </div>
  </div>

  <!-- Pending Appointments -->
  <!-- Pending Appointments -->
  <div class="card-custom mb-4">
    <h5><i class="fa-solid fa-bell"></i> Pending Appointment Requests</h5>
    <div id="pendingList" class="mt-3">
      <p class="text-muted text-center">Loading...</p>
    </div>
  </div>

  <!-- Telegram -->
  <div class="card-custom">
    <h5><i class="fa-brands fa-telegram"></i> Telegram Alerts</h5>
    <div id="telegramSection" class="mt-2">
      <p class="text-muted small">Loading...</p>
    </div>
  </div>

</div>

<!-- Reply Modal -->
<div class="modal fade" id="replyModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Reply to Appointment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="replyForm">
          <input type="hidden" id="replyApptId">
          <div class="mb-3">
            <label class="form-label">Date & Time</label>
            <input type="datetime-local" class="form-control" id="scheduledAt" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Fee (₹)</label>
            <input type="number" class="form-control" id="fee" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea class="form-control" id="replyNotes" rows="2"></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">Send Reply</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
if (!checkAuth('DOCTOR')) { }
const auth = getAuth();
document.getElementById('welcomeMsg').textContent = 'Good Morning, Dr. ' + auth.fullName + '!';

async function loadDashboard() {
    try {
        const appts = await apiGet('/api/doctor/appointments?doctorId=' + auth.userId);

        const pending = appts.filter(a => a.status === 'PENDING');
        const completed = appts.filter(a => a.status === 'COMPLETED');

        const today = new Date().toDateString();
        const todayAppts = appts.filter(a => a.scheduledAt && new Date(a.scheduledAt).toDateString() === today);

        document.getElementById('pendingCount').textContent = pending.length;
        document.getElementById('todayCount').textContent = todayAppts.length;
        document.getElementById('completedCount').textContent = completed.length;

        if (pending.length === 0) {
            document.getElementById('pendingList').innerHTML = '<p class="text-muted text-center">No pending requests.</p>';
        } else {
            let html = '';
            pending.forEach(a => {
                html += '<div class="card-custom mb-3">'
                    + '<div class="row align-items-center">'
                    + '<div class="col-md-3"><strong>' + a.patientName + '</strong><br><small class="text-muted">' + formatDate(a.createdAt) + '</small></div>'
                    + '<div class="col-md-6"><small class="text-muted">Symptoms:</small> ' + (a.symptoms || '-') + '</div>'
                    + '<div class="col-md-3 text-end"><button class="btn btn-sm btn-primary" onclick="openReply(' + a.id + ')">Reply</button></div>'
                    + '</div>'
                    + '</div>';
            });
            document.getElementById('pendingList').innerHTML = html;
        }
    } catch (e) {
        document.getElementById('pendingList').innerHTML = '<p class="text-danger text-center">Failed to load appointments.</p>';
    }
}

function openReply(id) {
    document.getElementById('replyForm').reset();
    document.getElementById('replyApptId').value = id;
    new bootstrap.Modal(document.getElementById('replyModal')).show();
}

document.getElementById('replyForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const id = document.getElementById('replyApptId').value;
    const payload = {
        scheduledAt: document.getElementById('scheduledAt').value + ':00',
        fee: parseFloat(document.getElementById('fee').value),
        notes: document.getElementById('replyNotes').value
    };
    showLoading();
    try {
        await apiPut('/api/doctor/appointments/' + id + '/reply', payload);
        hideLoading();
        showSuccess('Reply sent to patient!');
        bootstrap.Modal.getInstance(document.getElementById('replyModal')).hide();
        loadDashboard();
    } catch (err) {
        hideLoading();
        showError('Failed to send reply.');
    }
});

async function loadTelegram() {
    try {
        const status = await apiGet('/api/telegram/status/' + auth.userId);
        if (status.linked) {
            document.getElementById('telegramSection').innerHTML = '<p class="text-success mb-0"><i class="fa-solid fa-circle-check"></i> Telegram Connected</p>';
        } else {
            document.getElementById('telegramSection').innerHTML =
                '<p class="text-muted small">Link your Telegram to receive appointment and reply alerts.</p>'
                + '<button class="btn btn-primary btn-sm" onclick="linkTelegram()">Generate Link Code</button>'
                + '<div id="telegramCode" class="mt-2"></div>';
        }
    } catch (e) {
        document.getElementById('telegramSection').innerHTML = '<p class="text-muted small">Unable to check Telegram status.</p>';
    }
}

async function linkTelegram() {
    try {
        const data = await apiGet('/api/telegram/generate/' + auth.userId);
        document.getElementById('telegramCode').innerHTML =
            '<div class="alert alert-info small mb-0">'
            + 'Open <strong>@' + data.botUsername + '</strong> on Telegram and send code: <strong>' + data.code + '</strong>'
            + '</div>';
    } catch (e) {
        showError('Failed to generate code.');
    }
}

loadDashboard();
loadTelegram();
</script>

</body>
</html>
