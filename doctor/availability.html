<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Availability - Vaidyo Doctor</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-vaidyo">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-heart-pulse"></i> Vaidyo</a>
    <div class="ms-auto d-flex gap-2">
      <a href="dashboard.html" class="btn btn-sm btn-outline-light">Dashboard</a>
      <a href="appointments.html" class="btn btn-sm btn-outline-light">Appointments</a>
      <button class="btn btn-sm btn-light" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container my-4">

  <div class="card-custom mb-4">
    <h5><i class="fa-solid fa-calendar-plus"></i> Add Availability</h5>
    <form id="availForm" class="row g-3 mt-2">
      <div class="col-md-4">
        <label class="form-label">Date</label>
        <input type="date" class="form-control" id="date" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Start Time</label>
        <input type="time" class="form-control" id="startTime" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">End Time</label>
        <input type="time" class="form-control" id="endTime" required>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button type="submit" class="btn btn-primary w-100">Add</button>
      </div>
    </form>
  </div>

  <div class="card-custom">
    <h5><i class="fa-solid fa-list"></i> Current Availability</h5>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr><th>Date</th><th>Start</th><th>End</th><th>Status</th></tr>
        </thead>
        <tbody id="availBody">
          <tr><td colspan="4" class="text-muted text-center">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
if (!checkAuth('DOCTOR')) { }
const auth = getAuth();

async function loadAvailability() {
    try {
        const list = await apiGet('/api/doctor/availability?doctorId=' + auth.userId);
        if (list.length === 0) {
            document.getElementById('availBody').innerHTML = '<tr><td colspan="4" class="text-muted text-center">No availability added yet.</td></tr>';
        } else {
            let html = '';
            list.forEach(a => {
                html += '<tr>'
                    + '<td>' + a.date + '</td>'
                    + '<td>' + a.startTime + '</td>'
                    + '<td>' + a.endTime + '</td>'
                    + '<td>' + getStatusBadge(a.status || 'ACTIVE') + '</td>'
                    + '</tr>';
            });
            document.getElementById('availBody').innerHTML = html;
        }
    } catch (e) {
        document.getElementById('availBody').innerHTML = '<tr><td colspan="4" class="text-danger text-center">Failed to load availability.</td></tr>';
    }
}

document.getElementById('availForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const date = document.getElementById('date').value;
    const startTime = document.getElementById('startTime').value;
    const endTime = document.getElementById('endTime').value;

    const url = '/api/doctor/availability?doctorId=' + auth.userId
        + '&date=' + date + '&startTime=' + startTime + '&endTime=' + endTime;

    showLoading();
    try {
        await apiPost(url, {});
        hideLoading();
        showSuccess('Availability added!');
        document.getElementById('availForm').reset();
        loadAvailability();
    } catch (err) {
        hideLoading();
        showError('Failed to add availability.');
    }
});

loadAvailability();
</script>

</body>
</html>
